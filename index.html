:root{
  --night:#07080a; --night2:#0c0e12; --cream:#f3eee2; --cream-dim:#c8c3b6; --ink:#12141a;
  --warm:#e8c28a; --cool:#c4aeff; --hair:rgba(243,238,226,0.14); --hair-soft:rgba(243,238,226,0.08);
  --serif:"Cormorant Garamond","Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
  --mono:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
  --sans:"Inter",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; height:100%; background:var(--night); overflow:hidden; }
body{ font-family:var(--serif); color:var(--cream); touch-action:none; user-select:none; -webkit-user-select:none; }
#stage{ position:fixed; inset:0; display:block; }
#grain{
  position:fixed; inset:-50%; width:200%; height:200%; pointer-events:none; opacity:0.05; z-index:60; mix-blend-mode:screen;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  animation:grain 7s steps(6) infinite;
}
@keyframes grain{ 0%{transform:translate(0,0)} 16%{transform:translate(-3%,2%)} 33%{transform:translate(2%,-3%)} 50%{transform:translate(-2%,3%)} 66%{transform:translate(3%,-2%)} 83%{transform:translate(-3%,-1%)} 100%{transform:translate(0,0)} }
#vignette{ position:fixed; inset:0; pointer-events:none; z-index:55; background:radial-gradient(125% 95% at 50% 40%, rgba(0,0,0,0) 32%, rgba(0,0,0,0.42) 72%, rgba(0,0,0,0.72) 100%); }
#mark{ position:fixed; left:max(20px,env(safe-area-inset-left)); top:max(18px,env(safe-area-inset-top)); z-index:70; pointer-events:none; line-height:1; }
#mark .w{ font-family:var(--mono); font-size:13px; letter-spacing:.62em; color:var(--cream); opacity:.92; }
#mark .s{ font-family:var(--mono); font-size:9.5px; letter-spacing:.32em; text-transform:uppercase; color:var(--cream-dim); opacity:.55; margin-top:7px; transition:opacity .4s; }
#mute{ position:fixed; right:max(20px,env(safe-area-inset-right)); top:max(18px,env(safe-area-inset-top)); z-index:71; font-family:var(--mono); font-size:9.5px; letter-spacing:.26em; text-transform:uppercase; color:var(--cream-dim); background:transparent; border:1px solid var(--hair-soft); border-radius:999px; padding:8px 14px; cursor:pointer; opacity:0; transition:.3s; }
#mute.ready{ opacity:.6; }
#mute:hover{ opacity:1; border-color:rgba(196,174,255,0.4); color:var(--cream); }
#mute.off{ color:var(--cool); border-color:rgba(196,174,255,0.35); }
#roomname{ position:fixed; left:50%; top:17%; transform:translateX(-50%); z-index:72; pointer-events:none; font-family:var(--mono); font-size:13px; letter-spacing:.5em; text-transform:uppercase; color:var(--cream); opacity:0; text-align:center; white-space:nowrap; }
#roomname.show{ animation:roomTitle 3.6s ease forwards; }
@keyframes roomTitle{ 0%{opacity:0; letter-spacing:.72em} 16%{opacity:.92} 68%{opacity:.92} 100%{opacity:0; letter-spacing:.5em} }
#hint{ position:fixed; left:50%; bottom:max(22px,calc(env(safe-area-inset-bottom) + 14px)); transform:translateX(-50%); z-index:70; font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--cream-dim); background:rgba(7,8,10,0.5); border:1px solid var(--hair-soft); padding:8px 16px; border-radius:999px; backdrop-filter:blur(3px); pointer-events:none; transition:opacity .8s ease; opacity:.8; }
#hint.hide{ opacity:0; }
.veil{ position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center; }
.backdrop{ position:absolute; inset:0; background:rgba(5,6,8,0.72); backdrop-filter:blur(5px); animation:fade .5s ease both; }
@keyframes fade{ from{opacity:0} to{opacity:1} }
@keyframes rise{ from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:translateY(0)} }
.panel{ position:relative; z-index:1; width:min(620px,92vw); max-height:86vh; overflow:auto; background:linear-gradient(180deg, rgba(16,18,22,0.96), rgba(9,10,13,0.97)); border:1px solid var(--hair); border-radius:3px; box-shadow:0 40px 120px rgba(0,0,0,0.7), inset 0 1px 0 rgba(243,238,226,0.05); padding:46px 50px 44px; animation:rise .5s cubic-bezier(.2,.8,.2,1) both; }
.panel::-webkit-scrollbar{ width:9px; } .panel::-webkit-scrollbar-thumb{ background:var(--hair); border-radius:9px; }
.eyebrow{ font-family:var(--mono); font-size:10.5px; letter-spacing:.42em; text-transform:uppercase; color:var(--warm); opacity:.85; margin:0 0 18px; }
.panel h2{ font-family:var(--serif); font-weight:500; font-size:clamp(26px,4.2vw,34px); line-height:1.12; margin:0 0 20px; letter-spacing:.005em; }
.panel p{ font-size:clamp(15px,2.1vw,16.5px); line-height:1.72; color:var(--cream); opacity:.9; margin:0 0 16px; }
.panel p.lede{ font-style:italic; color:var(--cream); opacity:.96; }
.panel .small{ font-family:var(--mono); font-size:11px; letter-spacing:.05em; color:var(--cream-dim); opacity:.7; }
.panel .tagline{ font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--cream-dim); opacity:.7; margin:-8px 0 22px; }
.rule{ height:1px; background:var(--hair); margin:24px 0; border:0; }
.reflect{ list-style:none; padding:0; margin:20px auto 24px; text-align:center; max-width:30ch; }
.reflect li{ font-family:var(--serif); font-size:clamp(16px,2.5vw,21px); line-height:1.75; color:var(--cream); opacity:0; animation:rise 1s ease forwards; }
.leave-name{ font-family:var(--serif); font-style:italic; font-size:clamp(21px,3.2vw,28px); line-height:1.4; color:var(--cool); text-align:center; margin:10px auto 4px; max-width:22ch; }
.letter{ margin:4px 0 4px; }
.letter p{ font-family:var(--serif); font-size:clamp(15px,2.1vw,17px); line-height:1.84; color:var(--cream); opacity:.9; margin:0 0 17px; }
.letter .l-lede{ font-style:italic; opacity:.82; }
.letter .l-turn{ text-align:center; font-family:var(--mono); font-style:normal; font-size:12px; letter-spacing:.5em; text-transform:uppercase; color:var(--warm); opacity:.9; margin:22px 0 22px; }
.letter .l-em{ text-align:center; font-style:italic; color:var(--cream); opacity:1; margin:24px auto; max-width:30ch; }
.letter .l-close{ text-align:center; font-size:clamp(17px,2.4vw,20px); line-height:1.5; color:var(--cream); opacity:1; margin:6px 0; letter-spacing:.01em; }
.letter .l-close:last-child{ color:var(--warm); margin-top:14px; }
.panel .accent{ font-family:var(--serif); font-style:italic; font-size:clamp(16px,2.3vw,20px); line-height:1.45; color:var(--cool); opacity:.96; text-align:center; margin:2px 0 0; }
.panel .ahd{ font-family:var(--mono); font-size:10.5px; letter-spacing:.4em; text-transform:uppercase; color:var(--warm); opacity:.85; margin:20px 0 12px; }
.panel .ahd-no{ color:var(--cool); }
.panel .ai{ font-size:clamp(13.5px,1.9vw,15px); line-height:1.6; opacity:.86; margin:0 0 9px; padding-left:16px; position:relative; }
.panel .ai::before{ content:"—"; position:absolute; left:0; color:var(--warm); opacity:.7; }
.panel .ai-no{ opacity:.66; }
.panel .ai-no::before{ color:var(--cool); }
.panel .breath{ font-family:var(--serif); font-style:italic; font-size:clamp(20px,3vw,27px); line-height:1.5; color:var(--cream); text-align:center; margin:14px auto 30px; max-width:24ch; opacity:.96; }
.panel .letter-invite{ display:block; font-family:var(--serif); font-style:italic; font-size:clamp(14px,1.9vw,16px); color:var(--cool); text-align:center; text-decoration:none; opacity:.78; transition:.25s; margin:0 auto 6px; max-width:34ch; }
.panel .letter-invite:hover{ opacity:1; }
a.act{ display:inline-block; text-decoration:none; }
.x{ position:absolute; top:16px; right:16px; z-index:3; width:38px; height:38px; border-radius:50%; border:1px solid var(--hair); background:transparent; color:var(--cream-dim); font-family:var(--mono); font-size:16px; cursor:pointer; display:grid; place-items:center; transition:.18s; opacity:.8; }
.x:hover{ color:var(--cream); border-color:var(--cream-dim); opacity:1; transform:rotate(90deg); }
.roster{ display:grid; gap:2px; margin-top:6px; }
.r-row{ display:grid; grid-template-columns:1fr auto; align-items:baseline; gap:14px; padding:16px 2px; border-top:1px solid var(--hair-soft); }

.act{ display:inline-flex; align-items:center; gap:12px; margin-top:10px; font-family:var(--mono); font-size:12px; letter-spacing:.22em; text-transform:uppercase; color:var(--night); background:var(--cream); border:0; border-radius:999px; padding:14px 26px; cursor:pointer; transition:.2s; }

.ghost{ display:inline-block; margin-top:14px; margin-left:18px; font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--cream-dim); background:none; border:0; cursor:pointer; opacity:.7; }
.ghost:hover{ opacity:1; color:var(--cream); }
#loom-overlay{ z-index:110; }
.loom-stage{ position:relative; z-index:1; width:min(760px,94vw); padding:38px 40px 34px; background:linear-gradient(180deg, rgba(12,14,18,0.9), rgba(7,8,11,0.94)); border:1px solid var(--hair); border-radius:4px; box-shadow:0 50px 140px rgba(0,0,0,0.75); animation:rise .55s cubic-bezier(.2,.8,.2,1) both; }
.loom-head{ display:flex; justify-content:space-between; align-items:flex-end; gap:20px; margin-bottom:6px; }
.loom-head h2{ font-family:var(--serif); font-weight:500; font-size:clamp(22px,3.4vw,28px); margin:0; }
.loom-head .sub{ font-size:14px; line-height:1.6; opacity:.78; max-width:44ch; margin:10px 0 0; }
#ribbon{ width:100%; height:64px; display:block; margin:22px 0 6px; opacity:.9; }
.threads{ display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin:14px 0 6px; }
.stems{ display:flex; flex-direction:column; gap:10px; margin:18px 0 6px; }
.stem{ display:flex; align-items:center; gap:14px; width:100%; text-align:left; padding:14px 18px; border-radius:10px; cursor:pointer;
  background:linear-gradient(180deg, rgba(243,238,226,0.05), rgba(243,238,226,0.02)); border:1px solid var(--hair-soft); color:var(--cream); transition:.25s; }
.stem:hover{ border-color:rgba(196,174,255,0.35); }
.stem .s-dot{ width:9px; height:9px; border-radius:50%; background:var(--cool); box-shadow:0 0 12px 2px rgba(196,174,255,0.6); flex:0 0 auto; transition:.25s; }
.stem .s-lab{ font-family:var(--mono); font-size:12px; letter-spacing:.16em; text-transform:uppercase; flex:0 0 116px; }
.stem .s-bar{ flex:1; height:2px; background:rgba(243,238,226,0.08); border-radius:2px; overflow:hidden; }
.stem .s-bar i{ display:block; height:100%; width:18%; background:linear-gradient(90deg, var(--cool), var(--cream)); transition:width .12s linear, opacity .25s; }
.stem .s-state{ font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--cream-dim); opacity:.6; flex:0 0 auto; min-width:44px; text-align:right; }
.stem.muted{ opacity:.5; }
.stem.muted .s-dot{ background:transparent; box-shadow:none; border:1px solid var(--cream-dim); }
.stem.muted .s-lab{ text-decoration:line-through; text-decoration-color:rgba(243,238,226,0.4); }
.thread{ display:flex; flex-direction:column; align-items:center; }
.thread .track{ position:relative; width:100%; max-width:90px; height:190px; margin:0 auto; border-radius:999px; cursor:ns-resize; touch-action:none; background:linear-gradient(180deg, rgba(243,238,226,0.05), rgba(243,238,226,0.02)); border:1px solid var(--hair-soft); overflow:hidden; }
.thread .fill{ position:absolute; left:0; right:0; bottom:0; border-radius:999px; pointer-events:none; }

.loom-foot{ display:flex; align-items:center; justify-content:space-between; gap:16px; margin-top:24px; }
.loom-line{ font-family:var(--serif); font-style:italic; font-size:15px; opacity:0; transition:opacity 1s ease; max-width:46ch; }

#begin{ position:fixed; inset:0; z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:0; background:radial-gradient(120% 100% at 50% 40%, #0a0c10 0%, #07080a 70%); transition:opacity 1.1s ease; }

#begin .bl{ font-family:var(--serif); font-style:italic; font-size:clamp(20px,3.6vw,27px); line-height:1.45; max-width:18ch; margin:30px 0 38px; opacity:.9; }
#begin .bb{ font-family:var(--mono); font-size:12px; letter-spacing:.28em; text-transform:uppercase; color:var(--night); background:var(--cream); border:0; border-radius:999px; padding:15px 34px; cursor:pointer; transition:.25s; }
#begin .bb:hover{ transform:translateY(-2px); box-shadow:0 14px 40px rgba(243,238,226,0.22); }
#begin .bsub{ font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--cream-dim); opacity:.45; margin-top:22px; }
#begin.gone{ opacity:0; pointer-events:none; }
#touch{ position:fixed; inset:0; z-index:80; pointer-events:none; display:none; }
#stick{ position:absolute; left:max(26px,env(safe-area-inset-left)); bottom:max(30px,calc(env(safe-area-inset-bottom) + 18px)); width:128px; height:128px; border-radius:50%; border:1px solid var(--hair); background:rgba(7,8,10,0.4); pointer-events:auto; touch-action:none; }
#nub{ position:absolute; left:50%; top:50%; width:54px; height:54px; margin:-27px 0 0 -27px; border-radius:50%; background:rgba(243,238,226,0.85); box-shadow:0 0 22px rgba(243,238,226,0.4); }
#act{ position:absolute; right:max(28px,env(safe-area-inset-right)); bottom:max(46px,calc(env(safe-area-inset-bottom) + 30px)); width:84px; height:84px; border-radius:50%; border:1px solid var(--hair); background:rgba(243,238,226,0.08); color:var(--cream); font-family:var(--mono); font-size:13px; letter-spacing:.1em; pointer-events:auto; display:grid; place-items:center; backdrop-filter:blur(2px); }

.hidden{ display:none !important; }
@media (prefers-reduced-motion: reduce){ #grain{ animation:none; } .panel,.loom-stage,.backdrop{ animation:none !important; } }

function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  VW = window.innerWidth; VH = window.innerHeight;
  cv.width = Math.round(VW*DPR); cv.height = Math.round(VH*DPR);
  cv.style.width = VW+"px"; cv.style.height = VH+"px";
  const ratio = VW/VH, worldRatio = WORLD.w/WORLD.h;
  if(ROOMS[currentRoom] && ROOMS[currentRoom].endless){
    cam.center=true; cam.follow=false; cam.snapped=false;
    cam.scale=clamp(Math.min(VW,VH)/900, 0.7, 1.25);     // a fixed, intimate zoom in the void
  } else if(ratio >= worldRatio){
    cam.center=false; cam.follow=false; cam.scale=Math.min(VW/WORLD.w, VH/WORLD.h);
    cam.ox=(VW - WORLD.w*cam.scale)/2; cam.oy=(VH - WORLD.h*cam.scale)/2;
  } else {
    cam.center=false; cam.follow=true;
    const pad=Math.min(VH*0.13, 130);        // headroom so top doorways never clip
    cam.scale=(VH-pad)/WORLD.h; cam.oy=pad; cam.snapped=false;
  }
}

function loadRoom(id, spawn){
  const R=ROOMS[id]; if(!R) return;
  currentRoom=id;
  WORLD=R.world; BOUNDS=R.bounds; OBJECTS=R.objects;
  BLOCKERS=[ ...R.walls, ...R.objects.filter(o=>o.block).map(o=>o.block) ];
  const sp=spawn||R.spawn;
  player.x=sp[0]; player.y=sp[1]; player.dir=sp[2]||"down";
  player.vx=0; player.vy=0; player.trail.length=0; player.moveTarget=null;
  initMotes(R.motes||40); initWanderers(R.wanderers||0);
  wellReset(); seeingReset(); skyReset(); holdingReset(); seedReset(); outsideReset(); resetPresenceFx(); initSpirits(R); resetWhispers();
  resize(); cam.snapped=false; showRoomName(R.name);
  if(started){
    Audio.enterRoom(id); memVisit(id);
    if(id==="warphall") Audio.enterHall(R.objects.filter(o=>o.kind==="weaver"));
    else Audio.leaveHall();
  }
}
function transitionTo(roomId, spawn){
  if(transition.active) return;
  transition.active=true; transition.t=0; transition.phase=0;
  transition.to=roomId; transition.spawn=spawn; paused=true;
}
function transAlpha(){
  if(!transition.active) return 0;
  const half=transition.dur/2;
  return transition.t<half ? (transition.t/half) : (1-(transition.t-half)/half);
}
function showRoomName(name){
  const el=$("roomname"); if(!el) return;
  el.textContent=name; el.classList.remove("show"); void el.offsetWidth; el.classList.add("show");
  const s=document.querySelector("#mark .s"); if(s) s.textContent=name.toLowerCase().replace(/^the /,"");
}

const FOOT_W=52, FOOT_H=26;
function footHits(fx,fy){
  const l=fx-FOOT_W/2, t=fy-FOOT_H, r=l+FOOT_W, b=fy;
  for(const bl of BLOCKERS){
    if(l < bl[0]+bl[2] && r > bl[0] && t < bl[1]+bl[3] && b > bl[1]) return true;
  }
  return false;
}
function resolveMove(fx,fy,dx,dy){
  let nx=clamp(fx+dx, BOUNDS.x, BOUNDS.x+BOUNDS.w);
  let ny=clamp(fy+dy, BOUNDS.y, BOUNDS.y+BOUNDS.h);
  let rx=fx; if(!footHits(nx,fy)) rx=nx;
  let ry=fy; if(!footHits(rx,ny)) ry=ny;
  return [rx,ry];
}

  },{passive:false});

  },{passive:false});
  function end(e){
    if(tid===null) return; const t=pt(e); if(t && t.identifier!==tid) return; tid=null;
    if(paused || transition.active){ player.moveTarget=null; return; }
    if(!moved){ const w=screenToWorld((t||{clientX:sx}).clientX, (t||{clientY:sy}).clientY);
      tapWorld(w.x, w.y, true); }                 // a tap: enter a door, touch a thing, or walk there
    else player.moveTarget=null;                  // a drag: release to stop
  }

function computeNearest(){
  let best=null, bd=Infinity;
  for(const o of OBJECTS){
    if(o.kind==="seed" && !Mem.sky22) continue;   // the centre opens only once the two circles are drawn
    if(o.kind==="voidback" && !VOID.armed) continue;   // the way back appears only once you've walked out
    const rr = (o.kind==="portal"||o.kind==="voidback") ? (o.r+110) : o.r;   // doorways are forgiving
    const d=dist2(player.x,player.y,o.sx,o.sy);
    if(d < rr*rr && d<bd){ bd=d; best=o; }
  }
  nearest=best;
}
function doAction(o){
  if(!o) return;
  switch(o.kind){
    case "modal":     openModal(o.copy); break;
    case "loom":      openLoom(); break;
    case "threshold": openLeave(); break;
    case "portal":    transitionTo(o.to, o.spawn); break;
    case "weaver":    openArtist(o.artist); break;
    case "well":      wellTrigger(); break;
    case "holding":   holdGive(); break;
    case "seed":      transitionTo("seed", ROOMS.seed.spawn); break;
    case "voidback":  transitionTo(o.to, o.spawn); break;
    case "principle": openPrinciple(o.idx); break;
  }
}
function tryInteract(){
  if(paused || transition.active || !nearest) return;
  doAction(nearest);
}
/* a tap or click in the world: enter a door, touch a thing, place a star, or walk there */
function tapWorld(wx, wy, allowWalk){
  if(paused || transition.active) return;
  // the sky receives your own stars wherever you touch the dark
  if(currentRoom==="sky"){
    if(wx>BOUNDS.x+8 && wx<BOUNDS.x+BOUNDS.w-8 && wy>BOUNDS.y+8 && wy<BOUNDS.y+BOUNDS.h-8){
      let onObj=false; for(const o of OBJECTS){ if(Math.hypot(wx-o.sx,wy-o.sy)<(o.r*0.6)){ onObj=true; break; } }
      if(!onObj){ sky.mine.push({ x:wx, y:wy, t:0 }); Mem.skyStars.push({ x:wx, y:wy });
        if(!sky.mineFrag) sky.mineFrag="yours, now, too"; Audio.chime(true); player.moveTarget=null; return; }
    }
  }
  // tap a thing to do its thing — doors enter, looms open, makers speak; doors are forgiving
  let hit=null, hd=Infinity;
  for(const o of OBJECTS){
    if(!o.kind || o.kind==="decor") continue;
    if(o.kind==="seed" && !Mem.sky22) continue;
    if(o.kind==="voidback" && !VOID.armed) continue;   // before you've left, the origin is just a place, not a door
    const rr = o.kind==="voidback" ? (o.r+120) : (o.kind==="portal" ? o.r : (o.r*0.78));
    const d=Math.hypot(wx-o.sx, wy-o.sy);
    if(d<rr && d<hd){ hd=d; hit=o; }
  }
  if(hit){ player.moveTarget=null; doAction(hit); return; }
  if(allowWalk) player.moveTarget={ x:wx, y:wy };
}

/* ════════════════════════════════════════════════════════════════════════
   AUDIO — one generative fabric: a room-tone drone, the four-thread loom,
   and (in the hall) per-weaver voices that swell as you approach, leaning the
   fabric toward whoever you stand near.
   ════════════════════════════════════════════════════════════════════════ */
const Audio = (function(){
  /* ════════════════════════════════════════════════════════════════════════
     THE HOUSE IS TUNED TO 22Hz.
     22 is below hearing — so it is felt, not heard: a slow heartbeat (lub-dub).
     Everything audible is a true octave of 22 (44·88·176·352·704·1408…),
     voiced in just-intonation Dorian — pure ratios for the bones, a minor-that-
     isn't-sad for the feeling. The audible range fills from the bottom up the
     longer you stay (the "bloom"). The four GG stems are the global bed: what
     you mute in the loom is what you hear everywhere; each room remixes that
     bed acoustically and adds one voice of its own.
     ════════════════════════════════════════════════════════════════════════ */
  const FUND=22;
  const foct = k => FUND*Math.pow(2,k);                 // 44, 88, 176, 352, 704, 1408

  const DOR  = [1, 9/8, 6/5, 4/3, 3/2, 5/3, 16/9];      // just-intonation Dorian
  const deg  = (i,oct)=>{ const r=DOR[((i%DOR.length)+DOR.length)%DOR.length]; return ROOT*r*Math.pow(2,oct||0); };
  const HEART = 60/22;                                  // 22 beats/min — the meditative pulse
  const BEAT = 0.60;

  // — the home composition: a slow modal progression the whole house moves through.
  //   each chord is a scale-degree root + a stacked-thirds voicing (in scale steps). —
  const sdeg = (i,oct)=> deg(i, (oct||0)+Math.floor(i/7));
  const PROG = [
    {root:0, add:[0,2,4]},   // i      — home
    {root:5, add:[0,2,4]},   // ♭VII   — the Dorian lift
    {root:3, add:[0,2,4]},   // IV     — open, hopeful
    {root:4, add:[0,2,4]},   // v      — gentle tension
    {root:2, add:[0,2,4]},   // ♭III   — warmth
    {root:5, add:[0,2,4]},   // ♭VII
    {root:3, add:[0,2,4]},   // IV
    {root:0, add:[0,2,4]},   // i      — return
  ];
  let chordIdx=0, barCount=0, barsPerChord=2;
  let chordRoot=ROOT, padVoices=[], padBus=null;
  let melPos=0, melDir=1, melRest=0;
  let swell=0.5;                                         // slow minute-scale dynamic breath

  let ac=null, master=null, lpf=null, voiceBus=null, delay=null, fb=null, wet=null, analyser=null, shaper=null, subBus=null;
  let running=false, schedTimer=null, nextNote=0, step=0, nextHeart=0;
  let mode="room", accent=null, curRoom="antechamber", roomVoice="shimmer", loomFocus=false;
  let gMute=false, curLevel=0.0;
  let bloom=0.0, bloomTarget=0.32;                      // how far up the octave ladder we've opened
  const visited=new Set();
  const voices={};                                      // per-weaver hall voices
  const stems={};                                       // the four GG stems (global bed)
  let loomLast=0;
  const v={ warmth:0.46, light:0.40, pulse:0.32, depth:0.50 };
  const drone=[];                                       // octave ladder partials
  let sub=null;

  // per-room acoustics: the same bed, recolored — cut/reverb/feedback/delay + one added voice
  const ROOMFX={
    antechamber:{ cut:3400, wet:0.20, fb:0.30, dl:BEAT*0.75, voice:"shimmer" },
    warphall:   { cut:2700, wet:0.17, fb:0.26, dl:BEAT*0.50, voice:"pulse"   },
    well:       { cut:900,  wet:0.58, fb:0.64, dl:BEAT*1.50, voice:"depth"   },
    seeing:     { cut:5400, wet:0.12, fb:0.18, dl:BEAT*0.33, voice:"bell"    },
    loomifesto: { cut:3000, wet:0.36, fb:0.44, dl:BEAT*1.00, voice:"choir"   },
    sky:        { cut:6200, wet:0.52, fb:0.40, dl:BEAT*2.00, voice:"stars"   },
    holding:    { cut:2300, wet:0.34, fb:0.40, dl:BEAT*1.10, voice:"choir"   },
    seed:       { cut:1500, wet:0.55, fb:0.50, dl:BEAT*2.20, voice:"depth"   },
    outside:    { cut:340,  wet:0.62, fb:0.30, dl:BEAT*2.60, voice:"none"    },
  };

  function shapeCurve(){ const n=1024,c=new Float32Array(n); for(let i=0;i<n;i++){const x=i/(n-1)*2-1; c[i]=Math.tanh(x*1.5);} return c; }

  function ensure(){
    if(ac) return;
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    ac=new AC();
    master=ac.createGain(); master.gain.value=0.0;
    shaper=ac.createWaveShaper(); shaper.curve=shapeCurve(); shaper.oversample="2x";
    analyser=ac.createAnalyser(); analyser.fftSize=1024; analyser.smoothingTimeConstant=0.82;
    lpf=ac.createBiquadFilter(); lpf.type="lowpass"; lpf.frequency.value=1400; lpf.Q.value=0.6;
    voiceBus=ac.createGain(); voiceBus.gain.value=0.9;
    delay=ac.createDelay(2.4); delay.delayTime.value=BEAT*0.75;
    fb=ac.createGain(); fb.gain.value=0.3;
    wet=ac.createGain(); wet.gain.value=0.0;
    subBus=ac.createGain(); subBus.gain.value=1.0;                  // sub bypasses the room filter
    delay.connect(fb); fb.connect(delay); delay.connect(wet);
    lpf.connect(voiceBus); voiceBus.connect(delay); voiceBus.connect(master); wet.connect(master);
    subBus.connect(master);
    master.connect(shaper); shaper.connect(analyser); analyser.connect(ac.destination);

    // — the 22Hz sub: a continuous fundamental, felt; shaped into the heartbeat by its gain —
    sub=ac.createGain(); sub.gain.value=0.0; sub.connect(subBus);
    { const o=ac.createOscillator(); o.type="sine"; o.frequency.value=FUND; o.connect(sub); o.start(); }
    { const o=ac.createOscillator(); o.type="sine"; o.frequency.value=foct(1); const g=ac.createGain(); g.gain.value=0.5; o.connect(g); g.connect(sub); o.start(); }

    // — the octave ladder (drone) that blooms upward: 88·176·352·704·1408 —
    [2,3,4,5,6].forEach(k=>{
      const o=ac.createOscillator(); o.type= k>=5?"sine":"triangle"; o.frequency.value=foct(k);
      // a gentle just-fifth companion for shimmer on the upper octaves
      const g=ac.createGain(); g.gain.value=0;
      o.connect(g); g.connect(lpf); o.start();
      let g5=null;
      if(k>=4){ const o5=ac.createOscillator(); o5.type="sine"; o5.frequency.value=foct(k)*1.5; g5=ac.createGain(); g5.gain.value=0; o5.connect(g5); g5.connect(lpf); o5.start(); }
      drone.push({ k, g, g5, base:[0.05,0.046,0.036,0.026,0.018][k-2] });
    });

    // — the chord pad: four voices that glide between chords (the harmony that MOVES) —
    padBus=ac.createGain(); padBus.gain.value=0.0; padBus.connect(lpf);
    [[0,1,0.5],[2,1,0.40],[4,1,0.34],[0,2,0.24]].forEach(([d,oct,lvl])=>{
      const o=ac.createOscillator(); o.type="sine"; o.frequency.value=sdeg(d,oct);
      const g=ac.createGain(); g.gain.value=lvl;
      const lfo=ac.createOscillator(); lfo.frequency.value=0.07+Math.random()*0.06; const lg=ac.createGain(); lg.gain.value=2.5;
      lfo.connect(lg); lg.connect(o.frequency); lfo.start();         // a little chorus drift
      o.connect(g); g.connect(padBus); o.start();
      padVoices.push({o,g});
    });

    /* — GG stems — placeholder generative stand-ins, re-tuned to 22 octaves + JI.
       >>> Replace each stem's source with the real GG buffer + exact label
           (Bass / Melody / Atmosphere / Percussion) when 1 provides the files. <<< */
    function mkStem(lvl){ const g=ac.createGain(); g.gain.value=0; g.connect(lpf); return { g, level:lvl, muted:false }; }
    stems.bass=mkStem(0.12); stems.melody=mkStem(0.10); stems.atmosphere=mkStem(0.085); stems.percussion=mkStem(0.10);
    // bass — continuous low body on the 22 octaves
    { const o=ac.createOscillator(); o.type="triangle"; o.frequency.value=foct(2);            // 88
      const o2=ac.createOscillator(); o2.type="sine"; o2.frequency.value=foct(3); const mg=ac.createGain(); mg.gain.value=0.5; // 176
      o.connect(stems.bass.g); o2.connect(mg); mg.connect(stems.bass.g); o.start(); o2.start(); }
    // atmosphere — high air: root + just-fifth, slowly drifting
    { const o=ac.createOscillator(); o.type="sine"; o.frequency.value=deg(0,2);
      const o2=ac.createOscillator(); o2.type="sine"; o2.frequency.value=deg(4,2); const ag=ac.createGain(); ag.gain.value=0.42;
      o.connect(stems.atmosphere.g); o2.connect(ag); ag.connect(stems.atmosphere.g); o.start(); o2.start();
      const lfo=ac.createOscillator(); lfo.frequency.value=0.05; const lg=ac.createGain(); lg.gain.value=4;

  }

  function note(freq,t,dur,gain,type,dest){

    const g=ac.createGain();
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(gain,t+0.014);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);

  }
  function tick(freq,t,gain,dest){
    const len=Math.floor(ac.sampleRate*0.06); const buf=ac.createBuffer(1,len,ac.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
    const s=ac.createBufferSource(); s.buffer=buf;
    const bp=ac.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=freq; bp.Q.value=1.2;
    const g=ac.createGain(); g.gain.value=gain;
    s.connect(bp); bp.connect(g); g.connect(dest||master); s.start(t);
  }
  // the heartbeat: a swell of the 22 sub (felt) + a soft 88 thump (heard on any device)
  function heartThump(t, strong){
    const peak = (strong?0.5:0.26);
    sub.gain.cancelScheduledValues(t);
    sub.gain.setValueAtTime(Math.max(0.0001, sub.gain.value||0.0001), t);
    sub.gain.exponentialRampToValueAtTime(peak, t+0.06);
    sub.gain.exponentialRampToValueAtTime(0.06, t+(strong?0.5:0.34));

  }

  // glide the pad (and the harmonic centre) to the current chord
  function voiceChord(){
    if(!ac || !padVoices.length) return;
    const c=PROG[chordIdx], t=ac.currentTime;
    chordRoot=sdeg(c.root,0);
    const tones=[ sdeg(c.root+c.add[0],1), sdeg(c.root+c.add[1],1), sdeg(c.root+c.add[2],1), sdeg(c.root,2) ];

  }
  // a melodic line with phrasing: mostly stepwise, leaps to chord tones, rests, contour
  function melodyStep(t){
    if(melRest>0){ melRest--; return; }
    const c=PROG[chordIdx], chordDegs=c.add.map(s=>c.root+s);
    let next;
    if(Math.random()<0.34){ next = chordDegs[(Math.random()*chordDegs.length)|0] + (Math.random()<0.4?7:0); }  // leap to a chord tone
    else { next = melPos + melDir*(Math.random()<0.72?1:2); }                                                  // step
    if(next>11){ melDir=-1; next=11; } if(next<0){ melDir=1; next=0; }
    if(Math.random()<0.24) melDir*=-1;
    melPos=next;
    const f=sdeg(melPos,1);
    if(!isFinite(f)) return;
    const vel=(0.06+bloom*0.025)*(0.72+0.45*swell);                              // a true lead level
    note(f, t, BEAT*(0.85+Math.random()*0.9), vel, "triangle");                  // to the room filter — sits on top of the pad
    if(Math.random()<0.28) note(f*2, t+0.02, BEAT*0.7, vel*0.42, "sine");        // soft octave shadow

  // a sparse arpeggio of the current chord — gentle movement, sent through the delay
  function arpStep(t, k){
    const c=PROG[chordIdx], deg2=c.root + c.add[k%c.add.length] + (k>=c.add.length?7:0);
    const f=sdeg(deg2,2); if(!isFinite(f)) return;

  function schedule(){
    const ahead=0.12;
    // bloom eases toward target — the audible range fills from the bottom up
    bloom += (bloomTarget - bloom) * 0.012;
    applyBloom();
    // heartbeat (lub-dub) at 22/min
    while(nextHeart < ac.currentTime + ahead){
      heartThump(nextHeart, true);
      heartThump(nextHeart + HEART*0.18, false);
      nextHeart += HEART;
    }
    while(nextNote < ac.currentTime + ahead){
      const t=nextNote, beat=step%8;

      // — bar / chord clock: the whole house moves through the progression —
      if(beat===0){ barCount++;

          chordIdx=(chordIdx+1)%PROG.length; voiceChord();
          if(!stems.bass.muted) note(sdeg(PROG[chordIdx].root,-1), t, BEAT*4.2, 0.055*(0.7+0.4*swell), "sine");  // bass moves with the harmony

      swell = 0.5 + 0.42*Math.sin(ac.currentTime*0.07);

      if(!stems.percussion.muted && beat%4===0) tick(1500, t, stems.percussion.level*0.4*(0.6+swell), stems.percussion.g);

      if(stems.bass.muted && beat===0) note(sdeg(PROG[chordIdx].root,-1), t, BEAT*2.0, 0.045, "sine");
      if(stems.atmosphere.muted && beat===0) note(sdeg(PROG[chordIdx].root+4,2), t, BEAT*2.6, 0.026, "sine");

        const p=accent, r=(p&&p.root)||ROOT;

  }

  function roomVoiceTick(t, beat){
    const c=PROG[chordIdx], rt=c.root;
    switch(roomVoice){
      case "shimmer": if(beat===0 && Math.random()<0.5) note(sdeg(rt+4,2)*1.5, t, BEAT*2.2, 0.016+bloom*0.012, "sine"); break;
      case "pulse":   if(beat%2===1) tick(2200, t, 0.01); break;
      case "depth":   if(beat===0) note(sdeg(rt,-1), t, BEAT*3.0, 0.055, "sine"); break;            // cavernous reflection of the chord
      case "bell":    if(beat===0 && Math.random()<0.4){ note(sdeg(rt+2,2), t, BEAT*2.4, 0.028, "sine"); note(sdeg(rt+4,2), t+0.04, BEAT*2.0, 0.018, "sine"); } break;
      case "choir":   if(beat===0){ note(sdeg(rt,1), t, BEAT*3.4, 0.024, "sine"); note(sdeg(rt+2,1), t, BEAT*3.4, 0.018, "sine"); note(sdeg(rt+4,1), t, BEAT*3.4, 0.018, "sine"); } break;  // chord swell
      case "stars":   if(Math.random()<0.16) note(sdeg(rt+[0,2,4,5][(Math.random()*4)|0],3), t, BEAT*1.2, 0.013+bloom*0.009, "sine"); break;

      const open=clamp((bloom-thr)/0.25,0,1);

  }

    if(!ac) return; const now=ac.currentTime;

    fb.gain.setTargetAtTime((ROOMFX[curRoom]?ROOMFX[curRoom].fb:0.3), now, 0.3);
  }
  function applyRoom(){
    if(!ac) return; const fx=ROOMFX[curRoom]||ROOMFX.antechamber, now=ac.currentTime;
    const cut = loomFocus ? 6500 : fx.cut;
    lpf.frequency.setTargetAtTime(cut, now, 0.6);
    wet.gain.setTargetAtTime(fx.wet, now, 0.6);
    fb.gain.setTargetAtTime(fx.fb, now, 0.6);
    delay.delayTime.setTargetAtTime(fx.dl, now, 0.6);

  function setStems(on){ for(const k in stems){ stems[k].g.gain.setTargetAtTime((on && !stems[k].muted)?stems[k].level:0, ac.currentTime, 0.6); } }
  function startSched(){ if(!running){ running=true; nextNote=ac.currentTime+0.08; nextHeart=ac.currentTime+0.1; step=0; chordIdx=0; barCount=0; voiceChord(); schedTimer=setInterval(schedule,25); } }
  function setMaster(level, tc){ if(!ac) return; curLevel=level; master.gain.cancelScheduledValues(ac.currentTime); master.gain.setTargetAtTime(gMute?0.00012:level, ac.currentTime, tc||0.5); }

  function ensureVoices(list){
    if(!ac) return;
    for(const o of list){
      if(voices[o.id]) continue;
      const p=o.artist.profile; if(!p) continue;   // a place held open has no voice yet
      const g=ac.createGain(); g.gain.value=0; g.connect(lpf);
      const o1=ac.createOscillator(); o1.type=p.type||"triangle"; o1.frequency.value=p.root;
      const o2=ac.createOscillator(); o2.type="sine"; o2.frequency.value=p.root*1.5;
      const g2=ac.createGain(); g2.gain.value=0.5; o2.connect(g2); g2.connect(g);

  }
  function applyVoice(vv){ if(!ac) return; const lvl=vv.solo>1?Math.max(vv.target,0.7):vv.target; vv.g.gain.setTargetAtTime(vv.base*lvl*vv.solo, ac.currentTime, 0.16); }

  return {
    start(){ ensure(); if(ac && ac.state==="suspended") ac.resume(); },
    unlockOnly(){ this.start(); },
    // the world comes alive: the full bed plays, tuned to 22, blooming upward
    play(){ this.start(); if(!ac) return; mode="room"; startSched(); setStems(true); setMaster(0.5,0.5); applyRoom(); apply(); },
    ambient(){ this.start(); if(!ac) return; mode="room"; setStems(true); setMaster(0.18,0.9); },
    toAmbient(){ if(!ac) return; mode="room"; setMaster(0.5,0.6); },
    // each room recolors the same bed and brings a voice of its own
    enterRoom(name){ this.start(); if(!ac) return; curRoom=name; if(!visited.has(name)){ visited.add(name); bloomTarget=Math.min(1, 0.32 + visited.size*0.12); } mode = name==="warphall" ? "hall" : "room"; loomFocus=false; applyRoom(); apply(); },
    enterHall(list){ this.start(); if(!ac) return; ensureVoices(list); mode="hall"; startSched(); setMaster(0.5,0.6); },
    leaveHall(){ if(!ac) return; mode="room"; accent=null; for(const k in voices){ voices[k].target=0; voices[k].solo=1; voices[k].g.gain.setTargetAtTime(0, ac.currentTime, 0.4); } },
    // the loom: where you SEE and SHAPE the bed. Clarity opens; the edit persists everywhere.
    loomEnter(){ this.start(); if(!ac) return; loomLast=ac.currentTime; loomFocus=true; startSched(); applyRoom(); setMaster(0.5,0.5); },
    loomLeave(){ if(!ac) return; loomFocus=false; applyRoom(); setMaster(0.5,0.6); },
    toggleStem(name){ const s=stems[name]; if(!s) return false; s.muted=!s.muted; if(ac){ loomLast=ac.currentTime; s.g.gain.setTargetAtTime(s.muted?0:s.level, ac.currentTime, 0.18); } return s.muted; },
    stemMuted(name){ return !!(stems[name] && stems[name].muted); },
    muteAll(on){ gMute=on; if(ac) master.gain.setTargetAtTime(gMute?0.00012:curLevel, ac.currentTime, 0.25); },
    isMuted(){ return gMute; },
    prox(id,p){ const vv=voices[id]; if(vv){ vv.target=p; applyVoice(vv); } },
    setAccent(p){ accent=p; if(p && ac && mode==="hall") lpf.frequency.setTargetAtTime(p.cut||2400, ac.currentTime, 0.3); },
    soloWeaver(id,on){ const vv=voices[id]; if(vv){ vv.solo=on?2.2:1; applyVoice(vv); } },
    // a struck just-intonation chime (used for sigils, stars, the well)
    chime(high){ this.start(); if(!ac) return; const t=ac.currentTime+0.02; const base= high?deg(4,2):deg(0,1);

    // a maker's signature phrase — heard when you draw near a woven loom (their scale, their timbre)
    makerPhrase(p){ this.start(); if(!ac||!p) return;
      const root=p.root||ROOT, sc=p.scale||[0,2,3,5,7], type=(p.type==="sawtooth")?"triangle":(p.type||"triangle");
      const beat=(p.beat||0.6); let t=ac.currentTime+0.04;
      const pat=[0, Math.min(2,sc.length-1), Math.min(3,sc.length-1), Math.min(1,sc.length-1), 0], octs=[0,0,1,0,0];
      for(let i=0;i<pat.length;i++){ const f=root*Math.pow(2,(sc[pat[i]]||0)/12+octs[i]), last=(i===pat.length-1);
        if(isFinite(f)){ const g=last?0.26:0.20;
          note(f, t, beat*(last?2.4:0.95), g, type);
          if(isFinite(f*1.5)) note(f*1.5, t, beat*(last?1.6:0.7), g*0.4, "sine"); }   // a soft fifth, for body
        t+=beat*0.62; } },
    set(key,val){ v[key]=clamp(val,0,1); applyBloom(); },
    get(key){ return v[key]; },
    bloomNow(){ return bloom; },
    awaken(amt){ bloomTarget=Math.min(1, bloomTarget+(amt||0.05)); },
    heartEnv(){ if(!ac) return 0; const ph=(((ac.currentTime % HEART)+HEART)%HEART)/HEART;
      const bump=(x,c,w)=>Math.exp(-((x-c)*(x-c))/(2*w*w));
      return Math.min(1, bump(ph,0.0,0.05) + 0.55*bump(ph,0.18,0.04)); },
    levels(arr){ if(!analyser) return false; analyser.getByteTimeDomainData(arr); return true; },
  };
})();

const root=$("modal-root");
function clearRoot(){ root.innerHTML=""; }
function closeOverlay(){
  if(soloId){ Audio.soloWeaver(soloId,false); soloId=null; }
  if(root.firstChild){ clearRoot(); paused=false; }
  if(loomOpen) closeLoom();
}
function panelShell(html){
  const veil=document.createElement("div"); veil.className="veil";
  const bd=document.createElement("div"); bd.className="backdrop"; bd.onclick=closeOverlay;
  const p=document.createElement("div"); p.className="panel"; p.innerHTML=html;
  p.querySelector(".x").onclick=closeOverlay;
  veil.appendChild(bd); veil.appendChild(p); root.appendChild(veil);
  return p;
}
function openModal(key){
  paused=true; clearRoot();
  const c = key==="threshold"  ? COPY.threshold
          : key==="roster"     ? COPY.roster
          : key==="accounting" ? COPY.accounting
          : COPY.patronage;
  let html=`<button class="x" aria-label="close">&times;</button>`;
  html+=`<div class="eyebrow">${c.eyebrow}</div>`;
  if(c.title) html+=`<h2>${c.title}</h2>`;
  if(key==="patronage"){
    html+=`<p>${c.body[0].s}</p><canvas id="constell"></canvas><p>${c.body[1].s}</p><p class="small">${c.body[2].s}</p>`;
  } else if(key==="accounting"){
    html+=`<div class="ahd">It is</div>`;
    for(const s of c.is) html+=`<p class="ai">${s}</p>`;
    html+=`<div class="ahd ahd-no">It is not</div>`;
    for(const s of c.isnot) html+=`<p class="ai ai-no">${s}</p>`;
  } else if(key==="threshold"){
    html+=`<p class="breath">${c.breath}</p>`;
    html+=`<a class="letter-invite" href="${c.letterHref}" target="_blank" rel="noopener">${c.letterLine}</a>`;
    html+=`<hr class="rule"><a class="act" id="cta" href="${c.ctaHref}" target="_blank" rel="noopener">${c.cta} <span class="arr">&rarr;</span></a><button class="ghost" id="ghost">${c.ghost}</button>`;
  } else {
    for(const b of c.body){
      if(b.t==="lede") html+=`<p class="lede">${b.s}</p>`;
      else if(b.t==="small") html+=`<p class="small">${b.s}</p>`;
      else html+=`<p>${b.s}</p>`;
    }
  }
  panelShell(html);

function drawConstellation(c){
  /* The LOOM22 sigil — two overlapping circles, two mirrored constellations,
     a single seed where they cross. Gold is the maker; lavender is you; the
     seed is the shared space built for both at once. */
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const w=c.clientWidth||520, h=210;
  c.width=w*dpr; c.height=h*dpr; const g=c.getContext("2d"); g.scale(dpr,dpr);
  const cx=w/2, cy=h/2, R=h*0.40, off=R*0.52;
  const L=[cx-off,cy], Rt=[cx+off,cy];
  const star=[[-0.46,-0.16],[-0.22,-0.34],[-0.18,0.18],[-0.40,0.30],[-0.05,0.0]];
  const lpts=star.map(([x,y])=>[L[0]+x*R*0.92, cy+y*R*0.92]);
  const rpts=star.map(([x,y])=>[Rt[0]-x*R*0.92, cy+y*R*0.92]);
  const t0=performance.now();
  (function loop(now){
    if(!document.body.contains(c)) return;
    const t=(now-t0)/1000; g.clearRect(0,0,w,h);
    g.lineWidth=1;
    g.strokeStyle="rgba(232,194,138,0.32)"; g.beginPath(); g.arc(L[0],L[1],R,0,7); g.stroke();
    g.strokeStyle="rgba(196,174,255,0.32)"; g.beginPath(); g.arc(Rt[0],Rt[1],R,0,7); g.stroke();
    const drawSide=(pts,col)=>{
      pts.forEach((p,i)=>{
        g.strokeStyle=`rgba(${col},0.30)`; g.lineWidth=0.8;
        g.beginPath(); g.moveTo(p[0],p[1]); g.lineTo(cx,cy); g.stroke();
        const ph=(t*0.45+i*0.2)%1, px=lerp(p[0],cx,ph), py=lerp(p[1],cy,ph);
        g.fillStyle=`rgba(243,238,226,${0.5*(1-ph)})`; g.beginPath(); g.arc(px,py,1.2,0,7); g.fill();
        const tw=0.45+0.4*Math.sin(t*1.4+i*1.7);
        g.fillStyle=`rgba(243,238,226,${0.35+0.4*tw})`; g.beginPath(); g.arc(p[0],p[1],1.6,0,7); g.fill();
      });
    };
    drawSide(lpts,"232,194,138");
    drawSide(rpts,"196,174,255");
    const pr=3+0.8*Math.sin(t*1.6);
    const grd=g.createRadialGradient(cx,cy,0,cx,cy,22);
    grd.addColorStop(0,"rgba(243,238,226,0.85)"); grd.addColorStop(1,"rgba(243,238,226,0)");
    g.fillStyle=grd; g.beginPath(); g.arc(cx,cy,22,0,7); g.fill();
    g.strokeStyle="rgba(243,238,226,0.65)"; g.lineWidth=1; g.beginPath(); g.arc(cx,cy,5.5,0,7); g.stroke();
    g.fillStyle="#f3eee2"; g.beginPath(); g.arc(cx,cy,pr,0,7); g.fill();
    requestAnimationFrame(loop);
  })(t0);
}

  rc.width=rc.clientWidth*dpr; rc.height=64*dpr;

  (function draw(){

    const ok=Audio.levels(buf);
    let energy=0; if(ok){ for(let i=0;i<buf.length;i+=8){ const d=(buf[i]-128)/128; energy+=d*d; } energy=Math.sqrt(energy/(buf.length/8)); }
    g.lineWidth=1.4; g.strokeStyle="rgba(243,238,226,0.85)"; g.shadowColor="rgba(196,174,255,0.5)"; g.shadowBlur=8;

    ribbonRAF=requestAnimationFrame(draw);

/* ════════════════════════════════════════════════════════════════════════

function worldTransform(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  if(cam.center){                                  // the void: keep you centred, follow both axes, never clamp
    const tx=VW/2 - player.x*cam.scale, ty=VH/2 - player.y*cam.scale;
    if(!cam.snapped){ cam.camX=tx; cam.camY=ty; cam.snapped=true; }
    else { cam.camX += (tx-cam.camX)*Math.min(1,7*lastDt); cam.camY += (ty-cam.camY)*Math.min(1,7*lastDt); }
    ctx.translate(cam.camX, cam.camY); ctx.scale(cam.scale,cam.scale);
  } else if(cam.follow){
    const targetOx = clamp(VW/2 - player.x*cam.scale, Math.min(0, VW-WORLD.w*cam.scale), 0);
    if(!cam.snapped){ cam.camX=targetOx; cam.snapped=true; }
    else cam.camX += (targetOx-cam.camX)*Math.min(1, 9*lastDt);
    ctx.translate(cam.camX, cam.oy); ctx.scale(cam.scale,cam.scale);
  } else {
    ctx.translate(cam.ox, cam.oy); ctx.scale(cam.scale,cam.scale);
  }
}
function screenToWorld(sx,sy){
  if(cam.center) return { x:(sx-cam.camX)/cam.scale, y:(sy-cam.camY)/cam.scale };
  const ax = cam.follow ? cam.camX : cam.ox;
  return { x:(sx-ax)/cam.scale, y:(sy-cam.oy)/cam.scale };
}
/* ════════════════════════════════════════════════════════════════════════

function updatePresenceFx(dt){

    traceAcc+=dt;

/* ── light-spirits — luminous presences that grow curious, and scatter if you rush ── */
let spirits=[];
function initSpirits(R){

    x:BOUNDS.x+Math.random()*BOUNDS.w, y:BOUNDS.y+Math.random()*BOUNDS.h,
    vx:0, vy:0, ph:Math.random()*7, sp:0.3+Math.random()*0.55, gold:Math.random()<0.5, r:1.5+Math.random()*1.7 });

function updateSpirits(dt){
  const speed=Math.hypot(player.vx,player.vy);
  const rush=clamp((speed-90)/170,0,1);                 // a smooth 0..1, not a hard flip
  const k=Math.min(1,dt*2.2);
  for(const s of spirits){ s.ph+=dt*s.sp;
    let ax=Math.cos(s.ph*1.3)*5, ay=Math.sin(s.ph*1.1)*5;          // their own gentle wander

      const pull=lerp(0.40, -0.55, rush)*near*20;        // calm: drawn in · rushing: drift away — gentle either way
      ax+=dx/d*pull; ay+=dy/d*pull; }

    const sp=Math.hypot(s.vx,s.vy), CAP=42; if(sp>CAP){ s.vx*=CAP/sp; s.vy*=CAP/sp; }   // never dart
    s.x+=s.vx*dt; s.y+=s.vy*dt;

    const shx=x-fw/2+ sh*fw, shy=y-fh*0.55 + Math.sin(time*spd*2)*6;
    const shA = state==="strung" ? 0.35 : 1;             // strung: the shuttle waits, dim
    glow(shx,shy,15,`rgba(${tr},${tg},${tb},ALPHA)`,0.5*(0.5+prox*0.6)*shA);
    ctx.fillStyle=tint; ctx.globalAlpha=shA; ctx.beginPath(); ctx.arc(shx,shy,2.2,0,7); ctx.fill(); ctx.globalAlpha=1;
  }

  // the maker — a ghost-orb soul atop a robe; faint when strung, absent when a place waits.
  // as you near, they gently turn toward you and their light steadies — calm, intentional.
  const figA = state==="waiting" ? 0 : state==="strung" ? 0.34 : 0.55+prox*0.3;
  if(figA>0){
    const sway=Math.sin(time*baseSpd)*2;                 // a calm sway at their own tempo (not sped up)
    const face=(o._face!=null?o._face:0);                // smoothed lean toward you — eases, never snaps
    ctx.save(); ctx.translate(x,y); ctx.rotate(face*att*0.04);
    ctx.fillStyle=`rgba(243,238,226,${figA})`;
    ctx.beginPath();
    ctx.moveTo(0,-58);
    ctx.quadraticCurveTo(14+sway,-50,12,-24);
    ctx.quadraticCurveTo(10,-6,8,2); ctx.quadraticCurveTo(0,5,-8,2);
    ctx.quadraticCurveTo(-10,-6,-12,-24);
    ctx.quadraticCurveTo(-14+sway,-50,0,-58);
    ctx.closePath(); ctx.fill();
    if(style==="radiant"){ ctx.save(); ctx.globalCompositeOperation="lighter";   // a halo around the soul
      ctx.strokeStyle=`rgba(${tr},${tg},${tb},${0.3+prox*0.3})`; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.ellipse(2,-64,12,4.5,0,0,7); ctx.stroke(); ctx.restore(); }
    const headA = state==="strung" ? 0.7 : 1;            // the soul — their colour, looking at you
    drawGhostOrb(2+sway*0.4, -52, 7.5, [tr,tg,tb], {a:headA, ph:x, face:[face*0.7, 0.12]});
    ctx.restore();
  }

  if(state!=="waiting"){ ctx.fillStyle="rgba(0,0,0,0.35)"; ctx.beginPath(); ctx.ellipse(x,y+2,18,6,0,0,7); ctx.fill(); }
  // their name — an identity, not an empty figure
  const nm=o.artist&&o.artist.name;
  if(nm){ ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.font="italic 16px Georgia, serif"; ctx.fillStyle=`rgba(${tr},${tg},${tb},${0.42+prox*0.4})`;
    ctx.shadowColor=`rgba(${tr},${tg},${tb},0.5)`; ctx.shadowBlur=8;
    ctx.fillText(nm, x, y+34); ctx.restore(); }
}
/* ════════════════════════════════════════════════════════════════════════
   ROOM MECHANICS — The Well (descent & return) · The Seeing (dwell to reveal)
   ════════════════════════════════════════════════════════════════════════ */
const easeIn = t=>t*t, easeOut = t=>1-(1-t)*(1-t);

function drawFragment(text, x, y, a, col){
  if(!text || a<=0) return;
  col = col || "243,238,226";
  const t=text.replace(/&rsquo;/g,"\u2019").replace(/&mdash;/g,"\u2014").replace(/&hellip;/g,"\u2026").replace(/<\/?em>/g,"").replace(/&[a-z]+;/g,"");
  ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.font="italic 27px Georgia, 'Times New Roman', serif";
  const words=t.split(" "), max=560, lines=[]; let cur="";
  for(const w of words){ const test=cur?cur+" "+w:w; if(ctx.measureText(test).width>max && cur){ lines.push(cur); cur=w; } else cur=test; }
  if(cur) lines.push(cur);
  ctx.shadowColor=`rgba(${col},${0.45*a})`; ctx.shadowBlur=20;
  ctx.fillStyle=`rgba(${col},${0.92*a})`;
  const lh=38, y0=y-(lines.length-1)*lh/2;
  lines.forEach((ln,i)=>ctx.fillText(ln,x,y0+i*lh));
  ctx.restore();
}
/* — The Loomifesto colonnade: eight pillars, each a principle. Lit by your passing,
     they stay lit — the colonnade fills in behind you. — */
const loomMsg={t:6};
function drawPillar(o){
  const x=o.x, topY=o.y-140, baseY=o.y+150, p=Math.max(o.lit||0, o._prox||0);
  glow(x, o.y, 96, "rgba(232,194,138,ALPHA)", 0.05+0.13*p);
  const g=ctx.createLinearGradient(0,topY,0,baseY);
  g.addColorStop(0,`rgba(243,238,226,${0.05+0.16*p})`);
  g.addColorStop(0.5,`rgba(243,238,226,${0.15+0.26*p})`);
  g.addColorStop(1,`rgba(243,238,226,${0.04+0.10*p})`);
  ctx.fillStyle=g; ctx.fillRect(x-7, topY, 14, baseY-topY);
  ctx.strokeStyle=`rgba(232,194,138,${0.16+0.42*p})`; ctx.lineWidth=1; ctx.strokeRect(x-7, topY, 14, baseY-topY);
  ctx.fillStyle=`rgba(243,238,226,${0.28+0.4*p})`;
  ctx.fillRect(x-17, topY-4, 34, 4); ctx.fillRect(x-17, baseY, 34, 4);
