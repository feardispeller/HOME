  ctx.font="italic 22px Georgia, serif"; ctx.fillStyle=`rgba(232,194,138,${0.5+0.5*p})`;
  ctx.fillText(PRINCIPLES[o.idx].n, x, topY-24); ctx.restore();
}
function drawPrincipleAccent(){
  let best=null, bp=0;
  for(const o of OBJECTS){ if(o.kind!=="principle") continue;
    const d=Math.hypot(player.x-o.x, player.y-o.y), p=clamp(1-d/300,0,1);
    if(p>bp){ bp=p; best=o; } }
  if(best && bp>0.05) drawFragment(PRINCIPLES[best.idx].accent, best.x, best.y-210, Math.min(1,bp*1.4), "196,174,255");
  if(Mem.loomComplete){
    const a=Math.min(1, loomMsg.t/1.5) * (loomMsg.t>5?Math.max(0,(6-loomMsg.t)/1):1);
    drawFragment("The work grows here. It is never imprisoned here.", BOUNDS.x+BOUNDS.w/2, BOUNDS.y+90, a*0.9, "232,194,138");
  }
}

/* — The Well: a still surface. Press to send longing down; a changed thing rises. */
function drawWell(o){
  const x=o.x, y=o.y, RW=168, RH=68;
  // a shaft of light falling from far above onto the water
  ctx.save(); ctx.globalCompositeOperation="lighter";
  const shaft=ctx.createLinearGradient(x,y-460,x,y);
  shaft.addColorStop(0,"rgba(243,238,226,0)"); shaft.addColorStop(1,"rgba(243,238,226,0.05)");
  ctx.fillStyle=shaft; ctx.beginPath(); ctx.moveTo(x-30,y-460); ctx.lineTo(x+30,y-460); ctx.lineTo(x+RW*0.7,y); ctx.lineTo(x-RW*0.7,y); ctx.closePath(); ctx.fill();
  ctx.restore();
  // the still pool — dark, with depth
  const g=ctx.createRadialGradient(x,y,0,x,y,RW);
  g.addColorStop(0,"rgba(0,0,0,0.66)"); g.addColorStop(0.62,"rgba(0,0,0,0.32)"); g.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(x,y,RW,RH,0,0,7); ctx.fill();
  // the sky, held in the water — reflected stars trembling on the surface
  ctx.save(); ctx.beginPath(); ctx.ellipse(x,y,RW-6,RH-3,0,0,7); ctx.clip(); ctx.globalCompositeOperation="lighter";
  const refl=ambientField("well-refl",30), L=well.level||0;
  for(const s of refl){ const tw=0.2+0.6*Math.sin(time*s.sp+s.ph);
    const rx=x+(s.rx-0.5)*(RW*1.9), ry=y+(s.ry-0.5)*(RH*1.7)+Math.sin(time*0.5+s.ph)*2.2;
    const col=s.lav?"196,174,255":"243,238,226";
    ctx.fillStyle=`rgba(${col},${0.11*tw*(0.45+L*0.55)})`; ctx.beginPath(); ctx.arc(rx,ry,s.r*0.95,0,7); ctx.fill(); }
  ctx.restore();
  // the well fills with light as you give to it — and remembers
  if(L>0){ ctx.save(); ctx.globalCompositeOperation="lighter";
    const rw=46+118*L, breath=1+0.045*Math.sin(time*0.8);
    const fg=ctx.createRadialGradient(x,y,0,x,y,rw*breath);
    fg.addColorStop(0,`rgba(196,174,255,${0.17*L})`); fg.addColorStop(0.6,`rgba(196,174,255,${0.06*L})`); fg.addColorStop(1,"rgba(196,174,255,0)");
    ctx.fillStyle=fg; ctx.beginPath(); ctx.ellipse(x,y,rw*breath,rw*0.4*breath,0,0,7); ctx.fill();
    ctx.strokeStyle=`rgba(196,174,255,${0.10+0.14*L})`; ctx.lineWidth=1; ctx.beginPath(); ctx.ellipse(x,y,rw,rw*0.4,0,0,7); ctx.stroke();
    ctx.restore();
  }
  // resting ripples — the surface never quite goes still
  ctx.save(); ctx.lineWidth=1;
  for(let i=0;i<3;i++){ const ph=(time*0.14+i/3)%1, rr=0.25+ph*0.95, a=0.07*(1-ph);
    ctx.strokeStyle=`rgba(243,238,226,${a})`; ctx.beginPath(); ctx.ellipse(x,y,RW*rr,RH*rr,0,0,7); ctx.stroke(); }
  ctx.restore();
  // the rim, and a breath of light at the centre
  ctx.strokeStyle="rgba(243,238,226,0.18)"; ctx.lineWidth=1; ctx.beginPath(); ctx.ellipse(x,y,RW,RH,0,0,7); ctx.stroke();
  glow(x,y-2,50,"rgba(196,174,255,ALPHA)",0.05+0.02*Math.sin(time*0.7));
}
const well = { phase:"idle", t:0, frag:"", fi:0, level:0 };
function wellReset(){ well.phase="idle"; well.t=0; well.frag=""; }   // level + fi persist across visits
function wellTrigger(){
  if(well.phase!=="idle") return;
  well.phase="descend"; well.t=0;
  well.frag=COPY.well.fragments[well.fi % COPY.well.fragments.length]; well.fi++;
  well.level=Math.min(1,(well.level||0)+0.2);
  Mem.wellGiven++; Mem.wellFrags.push(well.frag); Audio.awaken(0.05);
}
function wellUpdate(dt){
  if(well.phase==="idle") return;
  well.t+=dt; const adv=to=>{ well.phase=to; well.t=0; };
  if(well.phase==="descend" && well.t>1.6) adv("pause");
  else if(well.phase==="pause" && well.t>0.9){ adv("rise"); Audio.chime(true); }
  else if(well.phase==="rise"  && well.t>2.0) adv("hold");
  else if(well.phase==="hold"  && well.t>3.6) adv("fade");
  else if(well.phase==="fade"  && well.t>1.6) wellReset();
}
function drawWellFx(){
  const s=OBJECTS.find(o=>o.kind==="well"); if(!s || well.phase==="idle") return;
  const x=s.x, y=s.y, ph=well.phase, t=well.t;
  if(ph==="descend"){
    const p=clamp(t/1.6,0,1), my=lerp(y-280,y,easeIn(p));
    glow(x,my,16,"rgba(243,238,226,ALPHA)",0.55*(1-p*0.25));
    ctx.fillStyle="#f3eee2"; ctx.beginPath(); ctx.arc(x,my,2.4,0,7); ctx.fill();
    if(p>0.85){ const r=(p-0.85)/0.15; ctx.strokeStyle=`rgba(243,238,226,${0.4*r})`; ctx.beginPath(); ctx.ellipse(x,y,70*r,28*r,0,0,7); ctx.stroke(); }
  } else if(ph==="pause"){
    const p=clamp(t/0.9,0,1); ctx.strokeStyle=`rgba(243,238,226,${0.34*(1-p)})`;
    ctx.beginPath(); ctx.ellipse(x,y,60+90*p,24+36*p,0,0,7); ctx.stroke();
  } else {
    let a=1;
    if(ph==="rise") a=clamp(t/2.0,0,1);
    if(ph==="fade") a=1-clamp(t/1.6,0,1);
    const ry = ph==="rise" ? lerp(y, y-230, easeOut(clamp(t/2.0,0,1))) : y-230;
    glow(x,ry,18,"rgba(232,194,138,ALPHA)",0.5*a);
    ctx.globalAlpha=a; ctx.fillStyle="#f3eee2"; ctx.beginPath(); ctx.arc(x,ry,2.4,0,7); ctx.fill(); ctx.globalAlpha=1;
    drawFragment(well.frag, x, y-320, a);
  }
}

/* — The Seeing: one evolving form. Dwelling is the input; words surface for those who stay. */
const seeing = { dwell:0, alpha:0, frag:"", fi:0, t:0, depth:0 };
function seeingReset(){ seeing.dwell=0; seeing.alpha=0; seeing.frag=""; }   // depth persists — it remembers your stillness
function seeingUpdate(dt){
  seeing.t+=dt;
  if(!player.moving) seeing.dwell+=dt; else seeing.dwell=Math.max(0, seeing.dwell-dt*2.4);
  if(seeing.dwell>3.2){
    if(!seeing.frag){ seeing.frag=COPY.seeing.fragments[seeing.fi % COPY.seeing.fragments.length]; seeing.fi++; }
    seeing.alpha=Math.min(1, seeing.alpha+dt*0.7);
    const was=seeing.depth; seeing.depth=Math.min(1, seeing.depth+dt*0.045);
    Mem.seeingDepth=Math.max(Mem.seeingDepth, seeing.depth);
    if(was<1 && seeing.depth>=1){ Audio.chime(true); Audio.awaken(0.08); }   // it has fully opened
  } else {
    seeing.alpha=Math.max(0, seeing.alpha-dt*1.3);
    if(seeing.alpha<=0) seeing.frag="";
  }
}
function drawSeeingForm(){
  const cx=BOUNDS.x+BOUNDS.w/2, cy=BOUNDS.y+BOUNDS.h/2-30, t=seeing.t, depth=seeing.depth||0, br=1+0.03*Math.sin(t*0.5);
  glow(cx,cy,120+depth*80,"rgba(243,238,226,ALPHA)",0.05+0.05*depth+0.02*Math.sin(t*0.5));
  // one ring of the mandala: m gives 2m rounded petals — integer, so it closes exactly and is symmetric
  const ring=(m,R,rot,col,a,lw)=>{
    if(a<=0.01) return; const vsq=0.95;
    ctx.strokeStyle=`rgba(${col},${a})`; ctx.lineWidth=lw||1; ctx.beginPath();
    for(let i=0;i<=260;i++){ const ang=i/260*Math.PI*2;
      const rr=R*br*(0.55+0.45*Math.abs(Math.cos(m*(ang-rot))));
      const X=cx+Math.cos(ang)*rr, Y=cy+Math.sin(ang)*rr*vsq;
      i===0?ctx.moveTo(X,Y):ctx.lineTo(X,Y); }
    ctx.closePath(); ctx.stroke();
    ctx.save(); ctx.globalCompositeOperation="lighter";   // a light at each petal tip
    for(let p=0;p<2*m;p++){ const ang=rot + p*Math.PI/m, rr=R*br;
      const X=cx+Math.cos(ang)*rr, Y=cy+Math.sin(ang)*rr*vsq;
      ctx.fillStyle=`rgba(${col},${a*0.9})`; ctx.beginPath(); ctx.arc(X,Y,1.5,0,7); ctx.fill(); }
    ctx.restore();
  };
  // faint radial spokes as it deepens
  if(depth>0.2){ ctx.save(); ctx.globalCompositeOperation="lighter"; ctx.strokeStyle=`rgba(243,238,226,${0.05*depth})`; ctx.lineWidth=1;
    const rays=12; for(let i=0;i<rays;i++){ const ang=t*0.04 + i*Math.PI*2/rays;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(ang)*150*br, cy+Math.sin(ang)*150*br*0.95); ctx.stroke(); }
    ctx.restore(); }
  // the rings bloom outward the longer you stay
  const base=0.34+0.18*seeing.alpha;
  ring(3,  60, -t*0.05, "243,238,226", 0.28+0.30*depth, 1);                          // inner six
  ring(6, 118,  t*0.05, "243,238,226", base+0.20*depth, 1.1);                         // the heart — always present (12 petals)
  ring(9, 150, -t*0.04, "196,174,255", 0.10+0.22*depth, 1);                           // lavender eighteen — blooms in
  if(depth>0.45) ring(12,190, t*0.03, "243,238,226", 0.16*((depth-0.45)/0.55), 1);    // outermost filigree — twenty-four
  // the central seed, breathing
  ctx.save(); ctx.globalCompositeOperation="lighter";
  ctx.fillStyle=`rgba(243,238,226,${0.55+0.3*Math.sin(t*0.8)})`; ctx.beginPath(); ctx.arc(cx,cy,2.4+depth,0,7); ctx.fill();
  ctx.restore();
  // a single luminous point circling — the attention itself
  const ph=t*0.3, orx=cx+Math.cos(ph)*118*br, ory=cy+Math.sin(ph)*118*br*0.95;
  glow(orx,ory,16,"rgba(196,174,255,ALPHA)",0.5);
  ctx.fillStyle="#f3eee2"; ctx.beginPath(); ctx.arc(orx,ory,2,0,7); ctx.fill();
}
function drawSeeingText(){ if(seeing.frag) drawFragment(seeing.frag, BOUNDS.x+BOUNDS.w/2, BOUNDS.y+BOUNDS.h-40, seeing.alpha); }

/* ── THE HOLDING ──────────────────────────────────────────────────────────
   Patronage made felt. You give from your pedestal; a parcel of your light
   travels to a maker. At the house it sheds a thin, capped 22% — never more.
   The rest reaches the maker and thickens a bond that stays. Their authorship
   never leaves them; what you hold is access. Truths surface only as you act. */
const HOLD = { YX:430, YY:486, HX:765, HY:452, MX:1130, MY:500 };   // your pedestal · the house · the maker
const HOLD_TRUTHS = [
  "it goes straight to them \u2014 not a pool.",
  "the house keeps 22%. never more.",
  "you hold access. they keep authorship.",
  "twenty-two of these. not a million streams.",
  "closer to patronage \u2014 without the distance.",
];
const holding = { parcels:[], slivers:[], bond:0, house:0, gives:0, truth:"", truthA:0, truthIdx:0, mk:0, t:0, hintA:0 };
function holdingReset(){
  holding.parcels=[]; holding.slivers=[]; holding.truth=""; holding.truthA=0; holding.mk=0; holding.t=0; holding.hintA=0;
  holding.bond=Mem.holding.bond; holding.house=Mem.holding.house; holding.gives=Mem.holding.gives;   // the bond is remembered
  holding.truthIdx=Math.min(holding.gives, HOLD_TRUTHS.length);
}
function holdGive(){
  holding.gives++; Mem.holding.gives=holding.gives;
  holding.parcels.push({ ox:HOLD.YX, oy:HOLD.YY-24, x:HOLD.YX, y:HOLD.YY-24, seg:0, t:0 });
  if(holding.truthIdx<HOLD_TRUTHS.length){ holding.truth=HOLD_TRUTHS[holding.truthIdx]; holding.truthA=0; holding.truthIdx++; }
  Audio.chime(true); Audio.awaken(0.05);
}
function holdingUpdate(dt){
  holding.t+=dt; holding.hintA=Math.min(1, holding.hintA+dt*0.3);
  if(holding.truth) holding.truthA=Math.min(1, holding.truthA+dt*0.5);
  if(holding.mk>0) holding.mk=Math.max(0, holding.mk-dt*1.6);
  const ss=u=>u*u*(3-2*u);
  for(let i=holding.parcels.length-1;i>=0;i--){ const p=holding.parcels[i]; p.t+=dt;
    if(p.seg===0){ const u=clamp(p.t/0.85,0,1); p.x=lerp(HOLD.YX,HOLD.HX,ss(u)); p.y=lerp(HOLD.YY-24,HOLD.HY,ss(u))-Math.sin(u*Math.PI)*34;
      if(u>=1){ p.seg=1; p.t=0;                                     // at the house: a thin, capped slice peels off
        holding.house=Math.min(1, holding.house+0.14); Mem.holding.house=holding.house;
        holding.slivers.push({ x:HOLD.HX, y:HOLD.HY, t:0 }); } }
    else { const u=clamp(p.t/0.85,0,1); p.x=lerp(HOLD.HX,HOLD.MX,ss(u)); p.y=lerp(HOLD.HY,HOLD.MY-46,ss(u))-Math.sin(u*Math.PI)*30;
      if(u>=1){ holding.bond=Math.min(1, holding.bond+0.16); Mem.holding.bond=holding.bond;   // it reaches the maker: the bond deepens
        holding.mk=1; Audio.chime(false); holding.parcels.splice(i,1); } }
  }
  for(let i=holding.slivers.length-1;i>=0;i--){ const s=holding.slivers[i]; s.t+=dt*1.4; if(s.t>=1) holding.slivers.splice(i,1); }
}
function drawHolding(o){   // your pedestal — a basin where your light pools, ready to give
  const x=o.x, y=o.y, prox=clamp(1-Math.hypot(player.x-o.sx,player.y-o.sy)/220,0,1);
  ctx.save();
  ctx.strokeStyle=`rgba(196,174,255,${0.22+prox*0.3})`; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(x,y,40,15,0,0,7); ctx.stroke();
  ctx.strokeStyle="rgba(243,238,226,0.10)"; ctx.beginPath(); ctx.moveTo(x-30,y+6); ctx.lineTo(x-22,y+40); ctx.moveTo(x+30,y+6); ctx.lineTo(x+22,y+40); ctx.stroke();
  ctx.restore();
  const breath=0.5+0.5*Math.sin(time*1.1);
  glow(x,y-2, 26+prox*16+breath*4, "rgba(196,174,255,ALPHA)", 0.12+prox*0.16);   // your light, pooled
  ctx.fillStyle=`rgba(220,210,255,${0.6+prox*0.3})`; ctx.beginPath(); ctx.arc(x,y-2,2.4,0,7); ctx.fill();
}
function drawHoldingRoom(){
  const t=time, bond=holding.bond, mk=holding.mk;
  // the maker, across the room — gold, their authorship glowing at their centre, never leaving them
  const MX=HOLD.MX, MY=HOLD.MY, mr=hexToRgb(COL.warm);
  ctx.save();
  // a small loom behind the maker (an echo of the hall)
  ctx.strokeStyle=`rgba(243,238,226,${0.16+mk*0.1})`; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(MX-46,MY-96); ctx.lineTo(MX-46,MY); ctx.moveTo(MX+46,MY-96); ctx.lineTo(MX+46,MY); ctx.moveTo(MX-54,MY-96); ctx.lineTo(MX+54,MY-96); ctx.stroke();
  ctx.lineWidth=1;
  for(let i=0;i<7;i++){ const tx=MX-40+i*(80/6); ctx.strokeStyle=`rgba(${mr[0]},${mr[1]},${mr[2]},${0.14+0.3*(0.5+0.5*Math.sin(t*2+i))*(0.4+bond*0.6)})`;
    ctx.beginPath(); ctx.moveTo(tx,MY-92); ctx.lineTo(tx,MY-2); ctx.stroke(); }
  ctx.fillStyle="rgba(0,0,0,0.35)"; ctx.beginPath(); ctx.ellipse(MX,MY+2,18,6,0,0,7); ctx.fill();
  ctx.restore();
  // the maker's robe + ghost-orb soul; the soul brightens when your light arrives
  ctx.save(); ctx.translate(MX,MY);
  ctx.fillStyle=`rgba(243,238,226,${0.5+mk*0.2})`;
  ctx.beginPath(); ctx.moveTo(0,-58);
  ctx.quadraticCurveTo(14,-50,12,-24); ctx.quadraticCurveTo(10,-6,8,2); ctx.quadraticCurveTo(0,5,-8,2);
  ctx.quadraticCurveTo(-10,-6,-12,-24); ctx.quadraticCurveTo(-14,-50,0,-58); ctx.closePath(); ctx.fill();
  drawGhostOrb(0,-50,8,mr,{a:1, ph:MX, halo:1+mk*0.5});
  ctx.restore();
  glow(MX,MY-50, 26+mk*40, `rgba(${mr[0]},${mr[1]},${mr[2]},ALPHA)`, 0.10+mk*0.4);   // acknowledgement

  ctx.save(); ctx.globalCompositeOperation="lighter";
  // the bond — a braided thread, you ↔ the maker, thickening with every give; it stays
  if(bond>0.01){ const yA=hexToRgb(COL.cool);
    for(let s=0;s<2;s++){ ctx.strokeStyle=`rgba(${(s?mr:yA)[0]},${(s?mr:yA)[1]},${(s?mr:yA)[2]},${0.12+0.4*bond})`; ctx.lineWidth=0.8+bond*2.2;
      ctx.beginPath();
      for(let i=0;i<=40;i++){ const u=i/40, bx=lerp(HOLD.YX,MX,u), by=lerp(HOLD.YY-24,MY-46,u)+Math.sin(u*Math.PI*5+t*1.4+s*Math.PI)*(3+bond*4)*(s?-1:1);
        i===0?ctx.moveTo(bx,by):ctx.lineTo(bx,by); }
      ctx.stroke(); }
    // a pulse of light travelling the living bond
    const bu=(t*0.22)%1, px=lerp(HOLD.YX,MX,bu), py=lerp(HOLD.YY-24,MY-46,bu);
    glow(px,py,5+bond*5,`rgba(243,238,226,ALPHA)`, 0.4*bond);
  }
  // the house — between you and the maker; it only ever takes a capped 22%
  const HX=HOLD.HX, HY=HOLD.HY, vw=30, vh=40;
  ctx.restore();
  ctx.save();
  ctx.strokeStyle="rgba(243,238,226,0.22)"; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(HX-vw/2,HY-vh/2); ctx.lineTo(HX-vw/2,HY+vh/2); ctx.lineTo(HX+vw/2,HY+vh/2); ctx.lineTo(HX+vw/2,HY-vh/2); ctx.stroke();
  const capY=HY+vh/2 - vh*0.22;                                  // the 22% line — fixed, immovable
  ctx.setLineDash([3,3]); ctx.strokeStyle="rgba(232,194,138,0.55)"; ctx.beginPath(); ctx.moveTo(HX-vw/2-5,capY); ctx.lineTo(HX+vw/2+5,capY); ctx.stroke(); ctx.setLineDash([]);
  const fillH=vh*0.22*Math.min(1,holding.house);                 // it fills toward the cap, and holds there
  ctx.save(); ctx.globalCompositeOperation="lighter";
  ctx.fillStyle="rgba(232,194,138,0.30)"; ctx.fillRect(HX-vw/2+1, HY+vh/2-fillH, vw-2, fillH);
  ctx.restore();
  ctx.fillStyle="rgba(232,194,138,0.7)"; ctx.textAlign="center"; ctx.font="10px ui-monospace,'SF Mono',monospace";
  ctx.fillText("22%", HX, HY-vh/2-8);
  ctx.textAlign="center"; ctx.fillStyle="rgba(243,238,226,0.32)"; ctx.font="italic 13px 'Cormorant Garamond',Georgia,serif";
  ctx.fillText("the house", HX, HY+vh/2+16);
  ctx.restore();
  // slivers — the thin share dropping into the house
  ctx.save(); ctx.globalCompositeOperation="lighter";
  for(const s of holding.slivers){ const yy=HY+ s.t*(vh*0.4); glow(HX,yy,4,"rgba(232,194,138,ALPHA)",0.5*(1-s.t)); }
  // parcels — your light in flight (78% of it continues past the house to the maker)
  for(const p of holding.parcels){ glow(p.x,p.y,8,"rgba(196,174,255,ALPHA)",0.5);
    ctx.fillStyle="rgba(230,222,255,0.9)"; ctx.beginPath(); ctx.arc(p.x,p.y,2.2,0,7); ctx.fill(); }
  ctx.restore();
  // ── plain language, so the room reads at a glance ──
  ctx.save(); ctx.textAlign="center";
  // the three roles, named
  ctx.fillStyle="rgba(196,174,255,0.5)"; ctx.font="italic 13px 'Cormorant Garamond',Georgia,serif";
  ctx.fillText("you", HOLD.YX, HOLD.YY+46);
  ctx.fillStyle=`rgba(232,194,138,${0.4+mk*0.3})`;
  ctx.fillText("the maker", HOLD.MX, HOLD.MY+44);
  // the thesis + the split, stated outright at the top of the room
  const fx=BOUNDS.x+BOUNDS.w/2, fy=BOUNDS.y+30;
  ctx.fillStyle="rgba(243,238,226,0.6)"; ctx.font="22px 'Cormorant Garamond',Georgia,serif";
  ctx.fillText("you hold a maker \u2014 you don\u2019t tip them", fx, fy);
  ctx.fillStyle="rgba(243,238,226,0.34)"; ctx.font="12px ui-monospace,'SF Mono',monospace";
  ctx.fillText("EVERY GIVE GOES STRAIGHT TO THEM \u00B7 THE HOUSE KEEPS AT MOST 22% \u00B7 THEY ALWAYS KEEP AUTHORSHIP", fx, fy+24);
  ctx.restore();
  // the truth, surfacing only as you act
  if(holding.truth) drawFragment(holding.truth, BOUNDS.x+BOUNDS.w/2, BOUNDS.y+BOUNDS.h+8, holding.truthA, "243,238,226");
  // a quiet invitation
  if(holding.hintA>0.02 && holding.gives===0){ ctx.save(); ctx.textAlign="center"; ctx.font="11px ui-monospace,'SF Mono',monospace";
    ctx.fillStyle=`rgba(243,238,226,${holding.hintA*0.5})`;
    ctx.fillText(isCoarse?"T A P   T O   G I V E":"P R E S S   E   T O   G I V E", HOLD.YX, HOLD.YY+70); ctx.restore(); }
}

/* ── THE SEED ──────────────────────────────────────────────────────────────
   The centre of the vesica, entered at last. The two circles — the maker (gold)
   and you (lavender) — drift together and resolve toward one white light. The 22
   heartbeat, felt-not-heard everywhere else, surfaces here at its source. Your
   whole path is gathered into the crossing. Four lines surface, earned by stillness. */
const seed = { t:0, reveal:0, line:"", lineA:0, lineIdx:0, motes:[] };
const SEED_LINES = [
  { at:2.5, s:"Two circles. The maker\u2019s, and yours." },
  { at:7.0, s:"The seed is where they cross." },
  { at:12.0, s:"You were always the place where they meet." },
  { at:17.5, s:"This is the place." },
];
function seedReset(){
  seed.t=0; seed.reveal=0; seed.line=""; seed.lineA=0; seed.lineIdx=0; seed.motes=[];
  const cx=BOUNDS.x+BOUNDS.w/2, cy=BOUNDS.y+BOUNDS.h/2;       // your path, gathered to the centre
  const add=(n,col)=>{ for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2, r=120+Math.random()*180;
    seed.motes.push({ x:cx+Math.cos(a)*r, y:cy+Math.sin(a)*r*0.8, t:0, sp:0.04+Math.random()*0.06, col }); } };
  add(Math.min(8,Mem.pillars.size), "232,194,138");
  add(Math.min(6,Mem.makers.size),  "243,238,226");
  add(Math.min(4,Mem.wellGiven),    "196,174,255");
  add(Math.min(6,Mem.skyStars.length), "243,238,226");
  if(Mem.holding.bond>0) add(Math.round(3*Mem.holding.bond), "196,174,255");
}
function seedUpdate(dt){
  seed.t+=dt;
  seed.reveal=Math.min(1, seed.reveal + dt*0.06);            // ~16s to resolve into one
  for(const m of seed.motes) m.t=Math.min(1, m.t + dt*m.sp);
  if(seed.line) seed.lineA=Math.min(1, seed.lineA + dt*0.4);
  while(seed.lineIdx<SEED_LINES.length && seed.t>=SEED_LINES[seed.lineIdx].at){
    seed.line=SEED_LINES[seed.lineIdx].s; seed.lineA=0; seed.lineIdx++;
    Audio.chime(seed.lineIdx>=3); Audio.awaken(0.07);
  }
  if(!Mem.seedFound) Mem.seedFound=true;                     // few ever come this far
}
function drawSeedRoom(){
  const cx=BOUNDS.x+BOUNDS.w/2, cy=BOUNDS.y+BOUNDS.h/2, e=seed.reveal;
  const R=Math.min(BOUNDS.w,BOUNDS.h)*0.42, off=R*0.52*(1-e*0.88);   // the circles drift together as it resolves
  const gold=hexToRgb(COL.warm), lav=hexToRgb(COL.cool);
  const mix=(c,t)=>[Math.round(lerp(c[0],247,t)),Math.round(lerp(c[1],243,t)),Math.round(lerp(c[2],234,t))];
  const gC=mix(gold,e*0.72), lC=mix(lav,e*0.72);
  for(const s of ambientField("seed-amb",40)){ const tw=0.2+0.5*Math.sin(time*s.sp+s.ph);   // faint deep field
    ctx.fillStyle=`rgba(243,238,226,${0.05*tw})`; ctx.beginPath();
    ctx.arc(BOUNDS.x+s.rx*BOUNDS.w, BOUNDS.y+s.ry*BOUNDS.h, s.r*0.8,0,7); ctx.fill(); }
  ctx.save(); ctx.globalCompositeOperation="lighter";
  const breath=1+0.02*Math.sin(time*0.5)+worldPulse*0.035;            // the two circles, breathing with the 22
  ctx.lineWidth=1.3; ctx.shadowBlur=18;
  ctx.strokeStyle=`rgba(${gC[0]},${gC[1]},${gC[2]},${0.3+0.3*e})`; ctx.shadowColor=ctx.strokeStyle;
  ctx.beginPath(); ctx.arc(cx-off,cy,R*breath,0,7); ctx.stroke();
  ctx.strokeStyle=`rgba(${lC[0]},${lC[1]},${lC[2]},${0.3+0.3*e})`; ctx.shadowColor=ctx.strokeStyle;
  ctx.beginPath(); ctx.arc(cx+off,cy,R*breath,0,7); ctx.stroke();
  ctx.shadowBlur=0;
  const STAR=[[-0.46,-0.16],[-0.22,-0.34],[-0.18,0.18],[-0.40,0.30],[-0.05,0.0]];
  const side=(ox,col,flip)=>{ for(let i=0;i<STAR.length;i++){ const sx=STAR[i][0]*(flip?-1:1), sy=STAR[i][1];
      const px=ox+sx*R*0.92, py=cy+sy*R*0.92;
      ctx.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},0.2)`; ctx.lineWidth=0.8;
      ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(cx,cy); ctx.stroke();
      const ph=(time*0.4+i*0.2)%1, mx=lerp(px,cx,ph), my=lerp(py,cy,ph);     // light running inward — both ways
      ctx.fillStyle=`rgba(243,238,226,${0.55*(1-ph)})`; ctx.beginPath(); ctx.arc(mx,my,1.3,0,7); ctx.fill();
      const tw=0.4+0.4*Math.sin(time*1.3+i*1.7); ctx.fillStyle=`rgba(243,238,226,${0.35+0.4*tw})`;
      ctx.beginPath(); ctx.arc(px,py,1.6,0,7); ctx.fill(); } };
  side(cx-off, gC, false); side(cx+off, lC, true);
  for(const m of seed.motes){ const mx=lerp(m.x,cx,m.t), my=lerp(m.y,cy,m.t), a=0.5*(1-m.t*0.35);   // your path, drawn in
    ctx.fillStyle=`rgba(${m.col},${a})`; ctx.beginPath(); ctx.arc(mx,my,1.5,0,7); ctx.fill(); }
  const beat=0.5+0.5*worldPulse, sr=10+e*16+beat*7;                   // the seed — the crossing, beating with the 22
  const sg=ctx.createRadialGradient(cx,cy,0,cx,cy,sr*3.4);
  sg.addColorStop(0,`rgba(247,243,234,${0.4+0.5*e})`); sg.addColorStop(1,"rgba(247,243,234,0)");
  ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(cx,cy,sr*3.4,0,7); ctx.fill();
  ctx.fillStyle=`rgba(255,253,248,${0.6+0.4*e})`; ctx.beginPath(); ctx.arc(cx,cy,2+e*2.5+beat*1.6,0,7); ctx.fill();
  ctx.restore();
  if(seed.line) drawFragment(seed.line, cx, BOUNDS.y+BOUNDS.h+12, seed.lineA, "243,238,226");
}
function drawSeedMark(o){
  if(!Mem.sky22) return;                       // the way in appears only once the 22 is drawn
  const x=o.x, y=o.y, b=0.5+0.5*Math.sin(time*1.0);
  ctx.save(); ctx.globalCompositeOperation="lighter";
  glow(x,y,32+b*16,"rgba(247,243,234,ALPHA)",0.16+0.12*b);
  ctx.strokeStyle=`rgba(247,243,234,${0.28+0.2*b})`; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(x,y,18+b*5,0,7); ctx.stroke();
  ctx.restore();
}

/* ── THE OUTSIDE ───────────────────────────────────────────────────────────
   no-thing. You walk into an endless dark with only the light you came from
   behind you. For a long, uncomfortable while: nothing. Then — only if you keep
   going when there's no reason to — the 22 surfaces naked, your trail draws a
   seed beneath you, and a few lines admit the truth: the silence out here is no
   one's, which is exactly why it becomes yours. You leave by returning to the light. */
const VOID = { t:0, dist:0, reveal:0, line:"", lineA:0, lineIdx:0, trail:[], trailAcc:0, armed:false, px:0, py:0,
  approach:0, found:false, ev:0, gAcc:0, gmotes:[], chAcc:0, lastStep:-1 };   // the void gathers, then reveals the law it always obeyed
const GOLDEN_ANGLE = Math.PI*(3 - Math.sqrt(5));     // 2.39996… rad = 137.50776° — the angle that never repeats
const GOLDEN_TURN  = (3 - Math.sqrt(5))/2;           // 0.381966… turns = 1/φ²  (golden angle as a fraction of a rotation)
// Fibonacci convergents p/q of the golden angle: a rational divergence p/q closes into EXACTLY q spokes.
// 1/2,1/3,2/5,3/8,5/13,8/21 → 2,3,5,8,13,21 spokes, converging to the angle that never closes. (from ONE-THIRTY-SEVEN)
const VOID_CONV = [[1,2],[1,3],[2,5],[3,8],[5,13],[8,21]];
const REV = { IGN:1.2, STEP:0.8, RES:2.2, PK:2.6, REC:4.2 };   // ignite · convergents · resolve · peak · recede
const VOID_LINES = [
  { at:2200, s:"Not the absence of something." },
  { at:3600, s:"The presence of no-thing." },
  { at:5200, s:"This silence belongs to no one." },
  { at:6600, s:"Which is the only way it could be yours." },
];
function outsideReset(){
  VOID.t=0; VOID.dist=0; VOID.reveal=0; VOID.line=""; VOID.lineA=0; VOID.lineIdx=0;
  VOID.trail=[]; VOID.trailAcc=0; VOID.armed=false; VOID.px=player.x; VOID.py=player.y;
  VOID.approach=0; VOID.found=false; VOID.ev=0; VOID.gAcc=0; VOID.gmotes=[]; VOID.chAcc=0; VOID.lastStep=-1;
}
function outsideUpdate(dt){
  VOID.t+=dt;
  const step=Math.hypot(player.x-VOID.px, player.y-VOID.py); VOID.px=player.x; VOID.py=player.y;
  VOID.dist += step;
  VOID.trailAcc += step;                              // the only mark in the void — your trail
  if(VOID.trailAcc>24){ VOID.trailAcc=0; VOID.trail.push({x:player.x,y:player.y,life:1}); if(VOID.trail.length>200) VOID.trail.shift(); }
  for(const p of VOID.trail) p.life=Math.max(0, p.life - dt*0.011);
  const target=clamp((VOID.dist-1800)/3800, 0, 1);    // the reveal, earned only by walking on
  VOID.reveal += (target-VOID.reveal)*Math.min(1,dt*0.5);
  if(VOID.line) VOID.lineA=Math.min(1, VOID.lineA+dt*0.35);
  while(VOID.lineIdx<VOID_LINES.length && VOID.dist>=VOID_LINES[VOID.lineIdx].at){
    VOID.line=VOID_LINES[VOID.lineIdx].s; VOID.lineA=0; VOID.lineIdx++;
    Audio.awaken(0.05); if(VOID.lineIdx>=3) Audio.chime(false);
  }
  const dOrig=Math.hypot(player.x, player.y);          // leaving is an act — step back into the light
  if(dOrig>340) VOID.armed=true;
  if(VOID.dist>=VOID_LINES[VOID_LINES.length-1].at) Mem.outsideReached=true;

  // PAST EVERY WORD — the no-thing stops being empty. The further you walk, the more it gathers:
  // motes of light drift in from the dark toward you. Cross the threshold and it reveals the law it
  // always obeyed — the golden angle — in a moment that completes on its own, whether you move or not.
  VOID.approach = clamp((VOID.dist-6600)/2200, 0, 1);
  if(!VOID.found){
    VOID.gAcc += dt;
    const interval = 0.12 - VOID.approach*0.085;        // they arrive faster the closer you are
    if(VOID.approach>0 && VOID.gAcc>interval){
      VOID.gAcc=0; const a=Math.random()*Math.PI*2, d=520+Math.random()*430;
      VOID.gmotes.push({ x:player.x+Math.cos(a)*d, y:player.y+Math.sin(a)*d, t:0, life:3+Math.random()*2.4 });
      if(VOID.gmotes.length>260) VOID.gmotes.shift();
    }
    for(const m of VOID.gmotes){ m.t+=dt; m.x+=(player.x-m.x)*dt*0.55; m.y+=(player.y-m.y)*dt*0.55; }
    VOID.gmotes = VOID.gmotes.filter(m=>m.t<m.life);
    VOID.chAcc += dt;                                    // a faint chime as the gathering thickens
    if(VOID.approach>0.35 && VOID.chAcc>1.4){ VOID.chAcc=0; Audio.awaken(0.04+VOID.approach*0.04); }
    if(VOID.dist>8800){ VOID.found=true; VOID.ev=0; Audio.awaken(0.22); Audio.chime(false); Mem.outsideBloomed=true; }
  } else {
    VOID.ev += dt;                                       // the revelation runs on its own clock
    const cStart=REV.IGN, cEnd=cStart+VOID_CONV.length*REV.STEP, rEnd=cEnd+REV.RES;
    if(VOID.ev>=cStart && VOID.ev<cEnd){                 // a soft tick as each convergent settles into its spokes
      const idx=Math.floor((VOID.ev-cStart)/REV.STEP);
      if(idx!==VOID.lastStep){ VOID.lastStep=idx; Audio.chime(true); }
    }
    if(VOID.ev>=rEnd && VOID.ev-dt<rEnd) Audio.awaken(0.16);              // the spokes dissolve into the golden fill
    if(VOID.ev>=rEnd+0.15 && VOID.ev-dt<rEnd+0.15) Audio.chime(false);   // the two glints meet, and refuse to merge
  }
  if(VOID.armed && dOrig<46){ Mem.outsideReached=true; transitionTo("antechamber",[800,820,"up"]); }
}
function drawVoidDoor(o){   // the quiet way out, in the antechamber — a slit of deeper dark
  const x=o.x, y=o.y, prox=clamp(1-Math.hypot(player.x-o.sx,player.y-o.sy)/240,0,1), w=46, h=96;
  ctx.save();
  const g=ctx.createLinearGradient(x,y-h,x,y);
  g.addColorStop(0,"rgba(0,0,0,0)"); g.addColorStop(1,"rgba(0,0,0,0.6)");
  ctx.fillStyle=g; ctx.fillRect(x-w/2,y-h,w,h);
  ctx.strokeStyle=`rgba(196,174,255,${0.09+prox*0.2})`; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(x-w/2,y); ctx.lineTo(x-w/2,y-h); ctx.quadraticCurveTo(x,y-h-9,x+w/2,y-h); ctx.lineTo(x+w/2,y); ctx.stroke();
  if(prox>0.02){ ctx.save(); ctx.globalCompositeOperation="lighter";
    glow(x,y-h*0.5, 22+prox*18, "rgba(196,174,255,ALPHA)", prox*0.1); ctx.restore(); }
  ctx.restore();
}
function drawVoidOrigin(o){   // the light you came from — your only landmark in the no-thing
  const x=o.x, y=o.y, b=0.5+0.5*Math.sin(time*0.6);
  ctx.save(); ctx.globalCompositeOperation="lighter";
  const g=ctx.createRadialGradient(x,y,0,x,y,160);
  g.addColorStop(0,`rgba(243,238,226,${0.22+b*0.06})`); g.addColorStop(0.5,"rgba(232,194,138,0.05)"); g.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,160,0,7); ctx.fill();
  const gr=ctx.createLinearGradient(x,y-92,x,y+12);
  gr.addColorStop(0,"rgba(243,238,226,0)"); gr.addColorStop(0.7,`rgba(243,238,226,${0.12+b*0.05})`); gr.addColorStop(1,"rgba(243,238,226,0)");
  ctx.fillStyle=gr; ctx.fillRect(x-1.5,y-92,3,104);
  ctx.fillStyle=`rgba(255,253,248,${0.5+b*0.2})`; ctx.beginPath(); ctx.arc(x,y,2.6,0,7); ctx.fill();
  if(VOID.armed){ ctx.strokeStyle=`rgba(243,238,226,${0.10+0.06*b})`; ctx.lineWidth=1;   // once you've left, it quietly invites you back
    ctx.beginPath(); ctx.arc(x,y,40+b*6,0,7); ctx.stroke(); }
  ctx.restore();
}
function drawOutsideField(){
  ctx.save(); ctx.globalCompositeOperation="lighter"; ctx.lineCap="round";    // your trail — the one mark in the void
  for(let i=1;i<VOID.trail.length;i++){ const a=VOID.trail[i], p=VOID.trail[i-1], life=(a.life+p.life)/2;
    if(life<=0) continue;
    ctx.strokeStyle=`rgba(196,174,255,${0.1*life})`; ctx.lineWidth=1.6*life+0.4;
    ctx.beginPath(); ctx.moveTo(p.x,p.y+18); ctx.lineTo(a.x,a.y+18); ctx.stroke(); }
  ctx.restore();
  const beat=0.5+0.5*worldPulse;
  // THE GATHERING — light drifts in from the dark toward you, thicker the further you've walked
  if(!VOID.found && VOID.gmotes.length){
    ctx.save(); ctx.globalCompositeOperation="lighter";
    for(const m of VOID.gmotes){ const k=clamp(1-m.t/m.life,0,1), d=Math.hypot(m.x-player.x,m.y-player.y);
      const app=clamp(1-d/640,0,1), al=0.05*k*app*(0.6+0.4*beat);
      if(al<=0.002) continue;
      ctx.fillStyle=`rgba(232,228,255,${al})`;
      ctx.beginPath(); ctx.arc(m.x,m.y+18, 1.1+1.4*app, 0,7); ctx.fill(); }
    ctx.restore();
  }
  const e=VOID.reveal;                                   // the no-thing answers — a seed beneath you, beating with the 22
  if(e>0.01 && !VOID.found){ const cx=player.x, cy=player.y+18, R=72*e, off=R*0.5;
    ctx.save(); ctx.globalCompositeOperation="lighter"; ctx.lineWidth=1;
    ctx.strokeStyle=`rgba(232,194,138,${0.1*e})`; ctx.beginPath(); ctx.arc(cx-off,cy,R*(1+beat*0.03),0,7); ctx.stroke();
    ctx.strokeStyle=`rgba(196,174,255,${0.1*e})`; ctx.beginPath(); ctx.arc(cx+off,cy,R*(1+beat*0.03),0,7); ctx.stroke();
    const sg=ctx.createRadialGradient(cx,cy,0,cx,cy,18+beat*8);
    sg.addColorStop(0,`rgba(247,243,234,${(0.16+0.32*e)*(0.5+0.5*beat)})`); sg.addColorStop(1,"rgba(247,243,234,0)");
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(cx,cy,18+beat*8,0,7); ctx.fill();
    ctx.restore(); }
  if(VOID.found) drawVoidRevelation();
}
/* THE REVELATION — cross the threshold and the no-thing shows the law it always obeyed. The dark
   crystallises into the golden angle (137.50776° — Vogel phyllotaxis, the most even never-repeating
   fill there is) centred on you, unfurling, then folding back. At the peak: the only saturated colour
   in the whole house — the cool glint and the warm glint drawn together, refusing to merge. Inside,
   the law was 22, the number we chose; out here it is the one we didn't. No number is shown — the
   form is the only word. It runs on its own clock, so it can never happen where you cannot see it. */
/* THE REVELATION — the no-thing shows the law it always obeyed, mathematically. The florets sweep
   through the Fibonacci convergents — a rational divergence p/q closes into EXACTLY q spokes — counting
   up 2,3,5,8,13,21, then dissolve into the golden angle (137.50776°), the limit that never closes and
   fills most evenly: every sunflower. The one place the house shows a number, because revealing the
   engine is the point. Then the two glints — cool and warm — meet, and refuse to merge. (ONE-THIRTY-SEVEN) */
function drawVoidRevelation(){
  const ev=VOID.ev, beat=0.5+0.5*worldPulse, cx=player.x, cy=player.y+18;
  const sm=u=>{ u=clamp(u,0,1); return u*u*(3-2*u); };
  const cStart=REV.IGN, NC=VOID_CONV.length, cEnd=cStart+NC*REV.STEP, rEnd=cEnd+REV.RES, pEnd=rEnd+REV.PK, end=pEnd+REV.REC;

  // divergence angle (in turns), the spoke label, and how "golden" we are
  let angTurn, spokeN=0, frac="", showAngle=false;
  if(ev<cStart){ angTurn=VOID_CONV[0][0]/VOID_CONV[0][1]; spokeN=VOID_CONV[0][1]; frac="1/2"; }
  else if(ev<cEnd){
    const k=(ev-cStart)/REV.STEP, i=Math.min(NC-1,Math.floor(k)), f=k-Math.floor(k);
    const cur=VOID_CONV[i], nxt=VOID_CONV[Math.min(NC-1,i+1)];
    angTurn=lerp(cur[0]/cur[1], nxt[0]/nxt[1], f<0.6?0:sm((f-0.6)/0.4));   // hold on the convergent, then slide
    spokeN=cur[1]; frac=cur[0]+"/"+cur[1];
  } else if(ev<rEnd){
    const e=sm((ev-cEnd)/REV.RES), last=VOID_CONV[NC-1];
    angTurn=lerp(last[0]/last[1], GOLDEN_TURN, e); spokeN=e<0.5?last[1]:0; frac=e<0.5?(last[0]+"/"+last[1]):""; showAngle=e>=0.5;
  } else { angTurn=GOLDEN_TURN; showAngle=true; }

  const grow=clamp(ev/REV.IGN,0,1), recede=clamp((ev-pEnd)/REV.REC,0,1), vis=1-recede;
  if(vis<=0) return;
  const N=Math.floor(110+450*grow), C=12*(0.92+0.08*beat), ang=angTurn*Math.PI*2, maxR=C*Math.sqrt(N);
  ctx.save(); ctx.globalCompositeOperation="lighter";
  for(let n=0;n<N;n++){
    const a=n*ang, r=C*Math.sqrt(n), x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r;
    const edge=N>1?n/N:0, fade=clamp((N-n)/60,0,1);
    const cr=Math.round(247-edge*72), cg=Math.round(248-edge*16);
    ctx.fillStyle=`rgba(${cr},${cg},255,${(0.05+0.13*fade)*vis*(0.8+0.2*beat)})`;
    ctx.beginPath(); ctx.arc(x,y,1.3+1.0*fade,0,7); ctx.fill();
  }
  const core=ctx.createRadialGradient(cx,cy,0,cx,cy,16+beat*9);     // the still warm centre
  core.addColorStop(0,`rgba(255,201,142,${(0.16+0.34*grow)*vis})`); core.addColorStop(1,"rgba(255,201,142,0)");
  ctx.fillStyle=core; ctx.beginPath(); ctx.arc(cx,cy,16+beat*9,0,7); ctx.fill();
  // the breath of colour — the two glints, meeting, refusing to merge (the only saturated colour in the house)
  const peak=clamp((ev-rEnd)/0.9,0,1)*clamp((pEnd+0.6-ev)/0.9,0,1);
  if(peak>0){ const sep=10+(1-peak)*44;
    const glint=(gx,col)=>{ const g=ctx.createRadialGradient(gx,cy,0,gx,cy,18+beat*9);
      g.addColorStop(0,col(0.55*peak*vis)); g.addColorStop(1,col(0)); ctx.fillStyle=g;
      ctx.beginPath(); ctx.arc(gx,cy,18+beat*9,0,7); ctx.fill(); };
    glint(cx-sep, a=>`rgba(169,220,255,${a})`); glint(cx+sep, a=>`rgba(255,201,142,${a})`);
  }
  ctx.restore();

  // the number — shown plainly, because here the form IS the meaning
  ctx.save(); ctx.textAlign="center"; ctx.globalAlpha=1;
  const ny=cy+maxR+34;
  if(spokeN>0 && !showAngle){
    ctx.fillStyle=`rgba(243,238,226,${0.7*vis})`; ctx.font="600 30px ui-monospace,'SF Mono',monospace";
    ctx.fillText(String(spokeN), cx, ny);
    ctx.fillStyle=`rgba(243,238,226,${0.34*vis})`; ctx.font="12px ui-monospace,'SF Mono',monospace";
    ctx.fillText(frac+" turn  \u2192  "+spokeN+" spokes", cx, ny+20);
  } else if(showAngle){
    ctx.fillStyle=`rgba(243,238,226,${0.72*vis})`; ctx.font="600 24px ui-monospace,'SF Mono',monospace";
    ctx.fillText("137.50776\u00B0", cx, ny);
    ctx.fillStyle=`rgba(243,238,226,${0.32*vis})`; ctx.font="12px ui-monospace,'SF Mono',monospace";
    ctx.fillText("the golden angle \u00B7 never closes \u00B7 fills most evenly", cx, ny+20);
  }
  ctx.restore();
}
function drawOutside(){ if(VOID.line && !VOID.found) drawFragment(VOID.line, player.x, player.y-150, VOID.lineA, "243,238,226"); }

const DRAW={ threshold:drawThreshold, roster:drawRoster, loom:drawLoom, lectern:drawLectern, font:drawFont, weaver:drawWeaver, well:drawWell, pillar:drawPillar, holding:drawHolding, seedmark:drawSeedMark, voiddoor:drawVoidDoor, voidorigin:drawVoidOrigin };


/* ── the ghost-orb: the LOOM22 being. A pearl of light with a coloured soul inside.
   The player is one (lavender — you), so are the wanderers, so is every maker (their
   own colour) and the place held open (you again). One kind of light, many souls. ── */
function drawGhostOrb(cx,cy,r,rgb,opt){
  opt=opt||{}; const a=(opt.a==null?1:opt.a); if(a<=0) return;
  const tr=rgb[0], tg=rgb[1], tb=rgb[2];
  const pulse=0.5+0.5*Math.sin(time*1.6+(opt.ph||0));
  ctx.save(); ctx.globalCompositeOperation="lighter";
  // a wide, soft soul-glow — the colour the being carries, bleeding into the dark
  const hr=r*4.2*(opt.halo||1);
  const gg=ctx.createRadialGradient(cx,cy,0,cx,cy,hr);
  gg.addColorStop(0,`rgba(${tr},${tg},${tb},${(0.24+0.10*pulse)*a})`);
  gg.addColorStop(0.5,`rgba(${tr},${tg},${tb},${0.09*a})`);
  gg.addColorStop(1,`rgba(${tr},${tg},${tb},0)`);
  ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(cx,cy,hr,0,7); ctx.fill();
  // the body — a soft luminous orb, bright at the core and fading to nothing (no hard edge)
  const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.55);
  bg.addColorStop(0,`rgba(255,254,250,${0.9*a})`);
  bg.addColorStop(0.42,`rgba(247,243,234,${0.5*a})`);
  bg.addColorStop(0.78,`rgba(${tr},${tg},${tb},${0.26*a})`);
  bg.addColorStop(1,`rgba(${tr},${tg},${tb},0)`);
  ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(cx,cy,r*1.55,0,7); ctx.fill();
  // the soul — a small bright heart in the being's colour, breathing
  ctx.fillStyle=`rgba(255,254,250,${(0.5+0.4*pulse)*a})`; ctx.beginPath(); ctx.arc(cx,cy,r*0.4,0,7); ctx.fill();
  ctx.fillStyle=`rgba(${tr},${tg},${tb},${(0.4+0.4*pulse)*a})`; ctx.beginPath(); ctx.arc(cx,cy,r*0.26,0,7); ctx.fill();
  // a soft whisper of light where the being is looking
  if(opt.face){ ctx.fillStyle=`rgba(255,253,248,${0.45*a})`;
    ctx.beginPath(); ctx.arc(cx+opt.face[0]*r*0.7, cy+opt.face[1]*r*0.7, r*0.26,0,7); ctx.fill(); }
  ctx.restore();
}
function drawPlayer(){
  const x=player.x, y=player.y;
  const bob = player.moving && !reduceMotion ? Math.sin(player.fAcc*8.5)*2.5 : 0;
  for(let i=0;i<player.trail.length;i++){
    const t=player.trail[i], a=(i/player.trail.length)*0.10;
    glow(t.x, t.y-46, 26, "rgba(243,238,226,ALPHA)", a);
  }
  ctx.fillStyle="rgba(0,0,0,0.4)"; ctx.beginPath(); ctx.ellipse(x,y,20,7,0,0,7); ctx.fill();
  glow(x, y-48+bob, 46, "rgba(243,238,226,ALPHA)", 0.20);
  ctx.save(); ctx.translate(x, y+bob);
  ctx.fillStyle="rgba(243,238,226,0.92)";
  ctx.beginPath();
  ctx.moveTo(0,-92);
  ctx.quadraticCurveTo(13,-86,13,-66); ctx.quadraticCurveTo(20,-30,15,-2);
  ctx.quadraticCurveTo(0,4,-15,-2); ctx.quadraticCurveTo(-20,-30,-13,-66);
  ctx.quadraticCurveTo(-13,-86,0,-92);
  ctx.closePath(); ctx.fill();
  const fd={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[player.dir]||[0,1];
  drawGhostOrb(0,-78,9.5,[196,174,255],{face:fd, halo:1.1});   // you — a lavender soul
  ctx.restore();
}

/* ── tooltip ───────────────────────────────────────────────────────────── */
function tooltipLift(o){
  if(o.kind==="weaver") return 150;
  if(o.kind==="well") return 130;
  if(o.kind==="holding") return 120;
  if(o.kind==="principle") return 210;
  if(o.kind==="threshold"||o.kind==="portal") return 230;
  return o.id==="loom"?200 : o.id==="roster"?210 : 110;
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function drawTooltip(o){
  const x=o.x, y=o.y - tooltipLift(o);
  const label=o.label;                          // as written — not a game prompt
  const bob=Math.sin(time*2)*(reduceMotion?0:2.5);
  const yy=y+bob;
  ctx.save();
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.font="italic 20px 'Cormorant Garamond', Georgia, serif";
  const tw=ctx.measureText(label).width;
  const grd=ctx.createRadialGradient(x,yy,0,x,yy,tw*0.7+44);
  grd.addColorStop(0,"rgba(7,8,10,0.5)"); grd.addColorStop(1,"rgba(7,8,10,0)");
  ctx.fillStyle=grd; ctx.beginPath(); ctx.ellipse(x,yy,tw*0.7+44,28,0,0,7); ctx.fill();
  ctx.shadowColor="rgba(196,174,255,0.3)"; ctx.shadowBlur=12;
  ctx.fillStyle="rgba(243,238,226,0.94)";
  ctx.fillText(label, x, yy);
  ctx.shadowBlur=0;
  ctx.font="10px ui-monospace, Menlo, monospace"; ctx.fillStyle="rgba(243,238,226,0.30)";
  ctx.fillText(isCoarse?"tap":"press e", x, yy+21);
  ctx.restore();
}

/* ════════════════════════════════════════════════════════════════════════
   MAIN LOOP
   ════════════════════════════════════════════════════════════════════════ */
function step_(now){
  const dt=Math.min((now-(tPrev||now))/1000, 0.033);
  time=now/1000; lastDt=dt;
  worldPulse = (started && !reduceMotion) ? Audio.heartEnv() : 0;

  // advance any room transition
  if(transition.active){
    transition.t+=dt;
    if(transition.phase===0 && transition.t>=transition.dur/2){ transition.phase=1; loadRoom(transition.to, transition.spawn); }
    if(transition.t>=transition.dur){ transition.active=false; transition.phase=0; paused=false; }
  }

  if(started && !paused && !transition.active){
    let ix=0, iy=0, keyMove=false;
    if(keys.has("arrowleft")||keys.has("a")){ ix-=1; keyMove=true; }
    if(keys.has("arrowright")||keys.has("d")){ ix+=1; keyMove=true; }
    if(keys.has("arrowup")||keys.has("w")){ iy-=1; keyMove=true; }
    if(keys.has("arrowdown")||keys.has("s")){ iy+=1; keyMove=true; }
    if(keyMove) player.moveTarget=null;                          // the keys take over at once
    else if(touch.active){ ix+=touch.x; iy+=touch.y; }
    if(player.moveTarget && !keyMove){                           // walk toward where you tapped / your finger
      const dx=player.moveTarget.x-player.x, dy=player.moveTarget.y-player.y, d=Math.hypot(dx,dy);
      if(d<14){ player.moveTarget=null; } else { ix=dx/d; iy=dy/d; }
    }
    const m=Math.hypot(ix,iy); if(m>1){ ix/=m; iy/=m; }
    const a=clamp(ACCEL*dt,0,1);
    player.vx += (ix*MOVE - player.vx)*a;
    player.vy += (iy*MOVE - player.vy)*a;
    if(Math.abs(player.vx)<2 && ix===0) player.vx=0;
    if(Math.abs(player.vy)<2 && iy===0) player.vy=0;
    player.moving = Math.hypot(player.vx,player.vy)>12;
    const [nx,ny]=resolveMove(player.x,player.y, player.vx*dt, player.vy*dt);
    player.x=nx; player.y=ny;
    if(player.moving){
      if(Math.abs(player.vx)>Math.abs(player.vy)) player.dir=player.vx<0?"left":"right";
      else player.dir=player.vy<0?"up":"down";
      player.fAcc+=dt;
    }
    if(player.moving && now%2<1){ player.trail.push({x:player.x,y:player.y}); if(player.trail.length>6) player.trail.shift(); }
    else if(!player.moving && player.trail.length) player.trail.shift();

    // world life
    updateMotes(dt); updateWanderers(dt); updatePresenceFx(dt); updateSpirits(dt); updateWhispers(dt);

    // hall proximity — the fabric leans toward whoever you stand near
    if(currentRoom==="warphall"){
      let near=null, nd=0;
      for(const o of OBJECTS){
        if(o.kind!=="weaver") continue;
        const d=Math.hypot(player.x-o.x, player.y-o.y), p=clamp(1-d/620,0,1);
        o._prox=p; Audio.prox(o.id,p);
        o._att = (o._att||0) + (p-(o._att||0))*Math.min(1,dt*2.4);              // smoothed attention (drives the calm lean)
        const tFace=clamp((player.x-o.x)/240,-1,1);
        o._face = (o._face||0) + (tFace-(o._face||0))*Math.min(1,dt*2.4);       // smoothed turn toward you
        if(p>0.62 && !o.woken){ o.woken=true; Audio.chime(true); Audio.awaken(0.04);
          if(!(o.artist&&o.artist.state==="waiting")) Mem.makers.add(o.id); }   // the place held open is yours, not a maker to count
        if(p>nd){ nd=p; near=o; }
      }
      Audio.setAccent(near ? near.artist.profile : null);
      // you hear the maker you've drawn closest to — once, as you arrive at them; a new voice for each
      if(near && near.artist.state==="woven" && nd>0.5){
        if(hallSpoke!==near.id){ hallSpoke=near.id; Audio.makerPhrase(near.artist.profile); }
      } else if(nd<0.34){ hallSpoke=null; }
    }
    if(currentRoom==="well") wellUpdate(dt);
    else if(currentRoom==="seeing") seeingUpdate(dt);
    else if(currentRoom==="holding") holdingUpdate(dt);
    else if(currentRoom==="seed") seedUpdate(dt);
    else if(currentRoom==="outside") outsideUpdate(dt);
    else if(currentRoom==="antechamber") updateSigilResonance(dt);
    else if(currentRoom==="sky") skyUpdate(dt);
    else if(currentRoom==="loomifesto"){
      for(const o of OBJECTS){ if(o.kind!=="principle") continue;
        const d=Math.hypot(player.x-o.x, player.y-o.y);
        o._prox=clamp(1-d/300,0,1);
        if(d<170){ const was=o.lit||0; o.lit=Math.min(1,(o.lit||0)+dt*0.85);
          if(was<1 && o.lit>=1 && !Mem.pillars.has(o.idx)){
            Mem.pillars.add(o.idx); Audio.chime(true); Audio.awaken(0.05);
            if(Mem.pillars.size===8 && !Mem.loomComplete){ Mem.loomComplete=true; loomMsg.t=0; Audio.awaken(0.2); }
          }
        }
      }
      if(Mem.loomComplete && loomMsg.t<6) loomMsg.t+=dt;
    }
    computeNearest();
  }

  // ── render ──
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,VW,VH);
  ctx.fillStyle=COL.night; ctx.fillRect(0,0,VW,VH);
  worldTransform();

  drawFloor();
  drawLantern(); drawRipples(); drawTrace();
  drawMotes();
  if(currentRoom==="seeing") drawSeeingForm();
  else if(currentRoom==="outside") drawOutsideField();
  // y-sorted draw list: objects + wanderers + player
  const list=[];
  for(const o of OBJECTS) list.push({ sortY:o.y, kind:"obj", o });
  for(const w of wanderers) list.push({ sortY:w.y, kind:"wanderer", w });
  list.push({ sortY:player.y, kind:"player" });
  list.sort((a,b)=>a.sortY-b.sortY);
  for(const it of list){
    if(it.kind==="player") drawPlayer();
    else if(it.kind==="wanderer") drawWanderer(it.w);
    else DRAW[it.o.draw](it.o);
  }
  drawSpirits(); drawWhispers();
  if(currentRoom==="well") drawWellFx();
  else if(currentRoom==="seeing") drawSeeingText();
  else if(currentRoom==="holding") drawHoldingRoom();
  else if(currentRoom==="seed") drawSeedRoom();
  else if(currentRoom==="outside") drawOutside();
  else if(currentRoom==="loomifesto") drawPrincipleAccent();
  else if(currentRoom==="sky") drawSkyRoom();
  if(started && !paused && !transition.active && nearest) drawTooltip(nearest);

  // transition veil (screen space)
  const ta=transAlpha();
  if(ta>0){ ctx.setTransform(DPR,0,0,DPR,0,0); ctx.fillStyle=`rgba(5,6,8,${ta})`; ctx.fillRect(0,0,VW,VH); }

  tPrev=now;
  requestAnimationFrame(step_);
}

/* ════════════════════════════════════════════════════════════════════════
   BOOT
   ════════════════════════════════════════════════════════════════════════ */
function init(){
  reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  isCoarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
  if(isCoarse){ $("touch").style.display="block";
    const st=$("stick"); if(st) st.style.display="none";          // whole-screen movement replaces the stick
    const act=$("act"); if(act) act.textContent="\u2726";                 // a touch glyph, not a keyboard key
    const h=$("hint"); if(h) h.innerHTML="Touch to move&nbsp;&nbsp;·&nbsp;&nbsp;tap a door to enter&nbsp;&nbsp;·&nbsp;&nbsp;tap&nbsp;\u2726&nbsp;for what glows";
  }
  loadRoom("antechamber");          // sets WORLD/BOUNDS/OBJECTS/BLOCKERS + spawn + motes/wanderers
  requestAnimationFrame(step_);
  setTimeout(()=>$("hint").classList.add("hide"), 8000);

  $("begin-btn").addEventListener("click", ()=>{
    Audio.play();
    Audio.enterRoom(currentRoom);
    started=true;
    const b=$("begin"); b.classList.add("gone");
    setTimeout(()=>b.classList.add("hidden"), 1200);
    const m=$("mute"); if(m) m.classList.add("ready");
  });

  const mb=$("mute");
  if(mb) mb.addEventListener("click", ()=>{
    const off = !Audio.isMuted();
    Audio.muteAll(off);
    mb.classList.toggle("off", off);
    mb.textContent = off ? "sound off" : "sound on";
  });
}
init();

})();
